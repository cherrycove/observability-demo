name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn --batch-mode verify

  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Check shell scripts
        run: for script in scripts/*.sh; do bash -n "$script"; done
      - name: Render Compose
        run: docker compose --env-file .env.example config >/dev/null
      - name: Lint and render Helm
        run: |
          helm lint charts/observability-demo
          helm lint charts/observability-demo --values charts/observability-demo/values-eks.yaml
          helm template demo charts/observability-demo --namespace observability-demo >/tmp/rendered.yaml
          docker run --rm -i ghcr.io/yannh/kubeconform:v0.6.7 -strict -summary </tmp/rendered.yaml
          helm template demo charts/observability-demo \
            --namespace observability-demo \
            --values charts/observability-demo/values-eks.yaml \
            >/tmp/eks-rendered.yaml
          grep -A20 'component: gateway-service' /tmp/eks-rendered.yaml | grep -q 'type: LoadBalancer'
          docker run --rm -i ghcr.io/yannh/kubeconform:v0.6.7 -strict -summary </tmp/eks-rendered.yaml
          helm repo add datakit https://pubrepo.truewatch.com/chartrepo/datakit
          helm repo update
          helm template datakit datakit/datakit \
            --version 2.5.0 \
            --namespace datakit \
            --values observability/datakit-values.example.yaml \
            --set-string datakit.dataway_url=https://example.invalid \
            >/tmp/datakit-rendered.yaml
          grep -q 'project=mall-demo' /tmp/datakit-rendered.yaml
          grep -q 'GET /actuator/health' /tmp/datakit-rendered.yaml
          docker run --rm -i ghcr.io/yannh/kubeconform:v0.6.7 -strict -summary </tmp/datakit-rendered.yaml
      - name: Custom secret rules
        run: scripts/secret-scan.sh
      - name: Gitleaks
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.28.0 dir --config /repo/.gitleaks.toml --no-banner --redact /repo

  compose-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start clean Compose stack
        run: |
          cp .env.example .env
          docker compose build --pull
          docker compose up -d
      - name: Wait and smoke test
        run: |
          if ! curl --fail --silent \
            --retry 60 --retry-delay 5 --retry-all-errors --retry-max-time 300 \
            http://127.0.0.1:8080/api/demo/config >/dev/null; then
            echo "::error::Gateway and order-service did not become ready within 5 minutes"
            exit 1
          fi
          scripts/smoke-test.sh
          test "$(docker compose exec -T order-service printenv PROJECT_TAG)" = "mall-demo"
          test "$(docker compose exec -T order-service printenv DD_TAGS)" = "project:mall-demo"
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down --volumes --remove-orphans

  kind-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1
        with:
          cluster_name: observability-demo
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Build and load images
        run: |
          for service in gateway order inventory payment; do
            docker build -f "${service}-service/Dockerfile" -t "docker.io/library/observability-demo-${service}-service:ci" .
            kind load docker-image --name observability-demo "docker.io/library/observability-demo-${service}-service:ci"
          done
      - name: Install demo
        run: |
          helm install demo charts/observability-demo \
            --namespace observability-demo \
            --create-namespace \
            --set image.registry=docker.io \
            --set image.owner=library \
            --set image.tag=ci \
            --set image.pullPolicy=Never
          for deployment in $(kubectl -n observability-demo get deployments -o name); do
            kubectl -n observability-demo rollout status "${deployment}" --timeout=8m
          done
          secret_name=demo-observability-demo
          secret_before="$(kubectl -n observability-demo get secret "${secret_name}" -o jsonpath='{.data.mysql-password}:{.data.mysql-root-password}')"
          test -n "${secret_before}"
          helm upgrade demo charts/observability-demo \
            --namespace observability-demo \
            --set image.registry=docker.io \
            --set image.owner=library \
            --set image.tag=ci \
            --set image.pullPolicy=Never
          secret_after="$(kubectl -n observability-demo get secret "${secret_name}" -o jsonpath='{.data.mysql-password}:{.data.mysql-root-password}')"
          test "${secret_before}" = "${secret_after}"
      - name: Verify security and behavior
        run: |
          kubectl -n observability-demo port-forward svc/demo-observability-demo-gateway-service 8080:80 >/tmp/port-forward.log 2>&1 &
          if ! curl --fail --silent \
            --retry 30 --retry-delay 2 --retry-all-errors --retry-max-time 60 \
            http://127.0.0.1:8080/api/demo/config >/dev/null; then
            echo "::error::Gateway port-forward did not become ready within 1 minute"
            exit 1
          fi
          scripts/smoke-test.sh
          test "$(kubectl -n observability-demo get pod -l app.kubernetes.io/component=order-service -o jsonpath='{.items[0].spec.securityContext.runAsUser}')" = "10001"
          test "$(kubectl -n observability-demo get pod -l app.kubernetes.io/component=order-service -o jsonpath='{.items[0].metadata.labels.project}')" = "mall-demo"
          test "$(kubectl -n observability-demo get pod -l app.kubernetes.io/component=mysql -o jsonpath='{.items[0].metadata.labels.project}')" = "mall-demo"
          test "$(kubectl -n observability-demo get pod -l app.kubernetes.io/component=order-service -o jsonpath='{.items[0].spec.containers[0].env[?(@.name=="DD_TAGS")].value}')" = "project:mall-demo"
          test "$(kubectl -n observability-demo get pod -l app.kubernetes.io/component=gateway-service -o jsonpath='{.items[0].spec.automountServiceAccountToken}')" = "false"
          log_annotation="$(kubectl -n observability-demo get pod -l app.kubernetes.io/component=order-service -o jsonpath='{.items[0].metadata.annotations.datakit/logs}')"
          grep -q '"source":"java_selfheal_demo"' <<<"${log_annotation}"
          grep -q '"service":"order-service"' <<<"${log_annotation}"
          if grep -q '"pipeline"' <<<"${log_annotation}"; then
            echo "::error::DataKit log annotation must leave the raw message for the platform Pipeline"
            exit 1
          fi
          kubectl auth can-i get pods/log --as system:serviceaccount:observability-demo:demo-observability-demo-log-reader -n observability-demo | grep -q yes
          kubectl auth can-i get secrets --as system:serviceaccount:observability-demo:demo-observability-demo-log-reader -n observability-demo | grep -q no
