name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn --batch-mode verify

  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Check shell scripts
        run: for script in scripts/*.sh; do bash -n "$script"; done
      - name: Render Compose
        run: docker compose --env-file .env.example config >/dev/null
      - name: Lint and render Helm
        run: |
          helm lint charts/guance-observability-demo
          helm lint charts/guance-observability-demo --values charts/guance-observability-demo/values-eks.yaml
          helm template demo charts/guance-observability-demo --namespace guance-demo >/tmp/rendered.yaml
          docker run --rm -i ghcr.io/yannh/kubeconform:v0.6.7 -strict -summary </tmp/rendered.yaml
          helm template demo charts/guance-observability-demo \
            --namespace guance-demo \
            --values charts/guance-observability-demo/values-eks.yaml \
            >/tmp/eks-rendered.yaml
          grep -A20 'component: gateway-service' /tmp/eks-rendered.yaml | grep -q 'type: LoadBalancer'
          docker run --rm -i ghcr.io/yannh/kubeconform:v0.6.7 -strict -summary </tmp/eks-rendered.yaml
          helm repo add datakit https://pubrepo.guance.com/chartrepo/datakit
          helm repo update
          helm template datakit datakit/datakit \
            --version 2.5.0 \
            --namespace datakit \
            --values observability/datakit-values.example.yaml \
            --set-string datakit.dataway_url=https://example.invalid \
            >/tmp/datakit-rendered.yaml
          grep -q 'project=mall-demo' /tmp/datakit-rendered.yaml
          docker run --rm -i ghcr.io/yannh/kubeconform:v0.6.7 -strict -summary </tmp/datakit-rendered.yaml
      - name: Custom secret rules
        run: scripts/secret-scan.sh
      - name: Gitleaks
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.28.0 dir --config /repo/.gitleaks.toml --no-banner --redact /repo

  compose-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start clean Compose stack
        run: |
          cp .env.example .env
          docker compose build --pull
          docker compose up -d
      - name: Wait and smoke test
        env:
          DEMO_CONTROL_TOKEN: change-me-control
        run: |
          for _ in {1..60}; do
            curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null && break
            sleep 5
          done
          scripts/smoke-test.sh
          test "$(docker compose exec -T order-service printenv PROJECT_TAG)" = "mall-demo"
          test "$(docker compose exec -T order-service printenv DD_TAGS)" = "project:mall-demo"
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down --volumes --remove-orphans

  kind-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1
        with:
          cluster_name: guance-demo
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Build and load images
        run: |
          for service in gateway order inventory payment; do
            docker build -f "${service}-service/Dockerfile" -t "docker.io/library/guance-observability-demo-${service}-service:ci" .
            kind load docker-image --name guance-demo "docker.io/library/guance-observability-demo-${service}-service:ci"
          done
      - name: Install demo
        run: |
          kubectl create namespace guance-demo
          kubectl -n guance-demo create secret generic guance-observability-demo \
            --from-literal=mysql-password=kind-mysql-password \
            --from-literal=mysql-root-password=kind-root-password \
            --from-literal=demo-control-token=kind-control-token
          helm install demo charts/guance-observability-demo \
            --namespace guance-demo \
            --set image.registry=docker.io \
            --set image.owner=library \
            --set image.tag=ci \
            --set image.pullPolicy=Never
          for deployment in $(kubectl -n guance-demo get deployments -o name); do
            kubectl -n guance-demo rollout status "${deployment}" --timeout=8m
          done
      - name: Verify security and behavior
        env:
          DEMO_CONTROL_TOKEN: kind-control-token
        run: |
          kubectl -n guance-demo port-forward svc/demo-guance-observability-demo-gateway-service 8080:80 >/tmp/port-forward.log 2>&1 &
          for _ in {1..30}; do
            curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null && break
            sleep 2
          done
          scripts/smoke-test.sh
          test "$(kubectl -n guance-demo get pod -l app.kubernetes.io/component=order-service -o jsonpath='{.items[0].spec.securityContext.runAsUser}')" = "10001"
          test "$(kubectl -n guance-demo get pod -l app.kubernetes.io/component=order-service -o jsonpath='{.items[0].metadata.labels.project}')" = "mall-demo"
          test "$(kubectl -n guance-demo get pod -l app.kubernetes.io/component=mysql -o jsonpath='{.items[0].metadata.labels.project}')" = "mall-demo"
          test "$(kubectl -n guance-demo get pod -l app.kubernetes.io/component=order-service -o jsonpath='{.items[0].spec.containers[0].env[?(@.name==\"DD_TAGS\")].value}')" = "project:mall-demo"
          test "$(kubectl -n guance-demo get pod -l app.kubernetes.io/component=gateway-service -o jsonpath='{.items[0].spec.automountServiceAccountToken}')" = "false"
          kubectl -n guance-demo get pod -l app.kubernetes.io/component=order-service -o jsonpath='{.items[0].metadata.annotations.datakit/logs}' | grep -q java-selfheal-demo.p
          kubectl auth can-i get pods/log --as system:serviceaccount:guance-demo:demo-guance-observability-demo-log-reader -n guance-demo | grep -q yes
          kubectl auth can-i get secrets --as system:serviceaccount:guance-demo:demo-guance-observability-demo-log-reader -n guance-demo | grep -q no
