spring.application.name=order-service
server.port=${SERVER_PORT:8080}
spring.datasource.url=${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/selfheal?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&connectTimeout=3000&socketTimeout=5000}
spring.datasource.username=${MYSQL_USER:selfheal}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=${MYSQL_POOL_SIZE:8}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
fault.order-slow-ms=${FAULT_ORDER_SLOW_MS:1600}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
spring.servlet.multipart.enabled=false
demo.control-token=${DEMO_CONTROL_TOKEN:}
demo.guance-console-url=${GUANCE_CONSOLE_URL:https://ap1-console.truewatch.com}
demo.guance-workspace-id=${GUANCE_WORKSPACE_ID:}
demo.project=${PROJECT_TAG:mall-demo}
demo.log-directory=${DEMO_LOG_DIRECTORY:/var/log/guance-observability-demo}
demo.kubernetes-log-reader.enabled=${KUBERNETES_LOG_READER_ENABLED:true}
rum.enabled=${RUM_ENABLED:false}
rum.application-id=${RUM_APPLICATION_ID:}
rum.datakit-origin=/rum-proxy
datakit.rum.url=${DATAKIT_RUM_URL:http://127.0.0.1:9529}
demo.logging.pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg | source=java_selfheal_demo service=${DD_SERVICE:order-service} env=${DD_ENV:demo} version=${DD_VERSION:1.0.0} project=${demo.project} trace_id=%X{dd.trace_id} span_id=%X{dd.span_id} key_request=%X{key_request} biz_request_id=%X{biz_request_id} fault_id=%X{fault_id} fault_layer=%X{fault_layer} fault_kind=%X{fault_kind} fault_target=%X{fault_target} process_id=%X{process_id} host_process_id=%X{host_process_id} container_process_id=%X{container_process_id} host=%X{host} host_name=%X{host_name} pod_name=%X{pod_name} pod_namespace=%X{pod_namespace} container_name=%X{container_name} container_id=%X{container_id}%n
logging.pattern.console=${demo.logging.pattern}
logging.pattern.file=${demo.logging.pattern}
