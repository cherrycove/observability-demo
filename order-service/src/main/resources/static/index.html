<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>商城 demo</title>
  <link rel="icon" href="data:," />
  <script src="assets/selfheal-i18n.js?v=20260710-workbench-v8"></script>
  <style>
    :root {
      --gc-primary: #1770e6;
      --gc-page: #f5f7fb;
      --gc-text: #1f2d3d;
      --gc-muted: #65758b;
      --gc-border: #dce3ee;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--gc-text);
      background:
        radial-gradient(circle at 20% 0%, rgba(23, 112, 230, .16), transparent 34%),
        linear-gradient(180deg, #fbfdff 0%, var(--gc-page) 100%);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    .panel {
      width: min(520px, 100%);
      display: grid;
      gap: 16px;
      padding: 24px;
      border: 1px solid var(--gc-border);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 48px rgba(16, 24, 40, .12);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    p {
      margin: 0;
      color: var(--gc-muted);
      font-size: 14px;
      line-height: 1.7;
    }

    a {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: center;
      padding: 10px 16px;
      border-radius: 8px;
      color: #fff;
      background: var(--gc-primary);
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1 data-i18n="appTitle">商城 demo</h1>
    <p data-i18n="parentLead">左侧商城运行在独立 iframe 中，RUM 只在商城页面初始化；右侧故障注入与日志面板不采集前端 RUM。</p>
    <a id="entryLink" href="business.html" data-i18n="parentOpenShop">打开独立商城</a>
  </main>
  <script>
    const I18N = window.SelfhealI18n;
    const language = I18N.setLanguage(I18N.detectLanguage(), { updateUrl: true });
    const entryUrl = new URL('business.html', window.location.href);
    entryUrl.searchParams.set('lang', language);
    document.getElementById('entryLink').href = entryUrl.pathname + entryUrl.search;
    window.setTimeout(() => {
      window.location.replace(entryUrl.pathname + entryUrl.search);
    }, 300);
  </script>
</body>
</html>
