<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>商城 Demo 与故障注入 Demo</title>
  <link rel="icon" href="data:," />
  <script src="assets/selfheal-i18n.js?v=20260715-replay-cover-v20"></script>
  <script>
    (() => {
      try {
        document.documentElement.dataset.leftCollapsed = localStorage.getItem('mall-workbench-left-collapsed') === 'true' ? 'true' : 'false';
        document.documentElement.dataset.rightCollapsed = localStorage.getItem('mall-workbench-right-collapsed') === 'true' ? 'true' : 'false';
      } catch (_) {
        document.documentElement.dataset.leftCollapsed = 'false';
        document.documentElement.dataset.rightCollapsed = 'false';
      }
    })();

  <style>
    :root {
      --gc-primary: #1770e6;
      --gc-primary-hover: #4d7ee6;
      --gc-primary-soft: #e8f2ff;
      --gc-success: #00a870;
      --gc-warning: #f5a623;
      --gc-danger: #dc3545;
      --gc-page: #f5f7fb;
      --gc-surface: #ffffff;
      --gc-surface-soft: #f8fafc;
      --gc-border: #dce3ee;
      --gc-border-strong: #b9c6d8;
      --gc-text: #1f2d3d;
      --gc-muted: #65758b;
      --gc-ink: #101828;
      --gc-shadow: 0 18px 48px rgba(16, 24, 40, .12);
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--gc-text);
      background:
        linear-gradient(180deg, #fbfdff 0%, var(--gc-page) 48%, #edf3fb 100%);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select { font: inherit; }

    button {
      min-height: 40px;
      padding: 9px 13px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: #fff;
      background: var(--gc-primary);
      cursor: pointer;
      font-weight: 800;
      transition: transform .14s ease, filter .14s ease, box-shadow .14s ease;
    }

    button:hover {
      filter: brightness(.98);
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(23, 112, 230, .18);
    }

    button:disabled {
      opacity: .58;
      cursor: wait;
      transform: none;
      box-shadow: none;
    }

    button.secondary {
      color: var(--gc-text);
      background: #fff;
      border-color: var(--gc-border);
    }

    button.warn { background: var(--gc-warning); color: #3d2500; }
    button.danger { background: var(--gc-danger); }

    a { color: inherit; text-decoration: none; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr;
    }

    .language-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--gc-border);
      border-radius: 8px;
      background: #f8fafc;
    }

    .language-toggle button {
      min-height: 30px;
      padding: 5px 9px;
      border-radius: 6px;
      background: transparent;
      color: var(--gc-muted);
      box-shadow: none;
      font-size: 12px;
    }

    .language-toggle button.active {
      color: #fff;
      background: #fff;
      background: var(--gc-primary);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid var(--gc-border);
      border-radius: 999px;
      background: #fff;
      color: var(--gc-muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--gc-success);
    }

    .dot.warn { background: var(--gc-warning); }
    .dot.bad { background: var(--gc-danger); }

    .page {
      width: 100%;
      height: 100vh;
      margin: 0 auto;
      padding: 14px;
      overflow: hidden;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: clamp(300px, 26vw, 500px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      min-height: calc(100vh - 28px);
    }

    .shop-lane {
      position: sticky;
      top: 14px;
      display: grid;
      justify-items: center;
      height: calc(100vh - 28px);
    }

    .phone-shell {
      position: relative;
      height: 100%;
      width: auto;
      max-width: 100%;
      aspect-ratio: 393 / 852;
      padding: 2px;
      border: 1px solid #111827;
      border-radius: 32px;
      background:
        linear-gradient(145deg, #2b3344 0%, #0b1120 48%, #050816 100%);
      box-shadow:
        0 26px 60px rgba(15, 23, 42, .24),
        inset 0 0 0 1px rgba(255, 255, 255, .08);
    }

    .phone-screen {
      position: relative;
      height: 100%;
      overflow: hidden;
      border: 0;
      border-radius: 29px;
      background:
        radial-gradient(circle at 8% 3%, rgba(255, 122, 0, .18), transparent 35%),
        radial-gradient(circle at 96% 2%, rgba(215, 48, 255, .13), transparent 32%),
        linear-gradient(180deg, #fff9f4 0%, #fff4fb 46%, #f8f7ff 100%);
      box-shadow: none;
    }

    .phone-camera {
      position: absolute;
      left: 50%;
      top: 6px;
      z-index: 5;
      width: 10px;
      height: 10px;
      transform: translateX(-50%);
      border: 2px solid #101827;
      border-radius: 999px;
      background: #020617;
      box-shadow:
        0 0 0 2px rgba(255, 255, 255, .1),
        inset 0 0 0 2px #111827;
    }

    .phone-statusbar {
      position: relative;
      z-index: 3;
      height: 29px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 21px;
      color: #172033;
      font-size: 12px;
      font-weight: 900;
      background: transparent;
    }

    .phone-icons {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .signal {
      position: relative;
      width: 18px;
      height: 12px;
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
    }

    .signal i {
      width: 3px;
      border-radius: 999px;
      background: #172033;
    }

    .signal i:nth-child(1) { height: 4px; }
    .signal i:nth-child(2) { height: 7px; }
    .signal i:nth-child(3) { height: 10px; }

    .wifi {
      width: 20px;
      height: 14px;
      display: block;
      color: #172033;
      fill: currentColor;
    }

    .battery {
      position: relative;
      width: 24px;
      height: 12px;
      display: inline-block;
      border: 2px solid #172033;
      border-radius: 4px;
    }

    .battery::before {
      content: "";
      position: absolute;
      right: -5px;
      top: 3px;
      width: 3px;
      height: 4px;
      border-radius: 0 2px 2px 0;
      background: #172033;
    }

    .battery::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 14px;
      height: 4px;
      border-radius: 2px;
      background: #172033;
    }

    .phone-frame-wrap {
      position: relative;
      height: calc(100% - 43px);
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 122, 0, .18), transparent 35%),
        radial-gradient(circle at 96% 0%, rgba(215, 48, 255, .13), transparent 32%),
        linear-gradient(180deg, #fff9f4 0%, #fff4fb 46%, #f8f7ff 100%);
    }

    .shop-frame {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: #f7faff;
    }

    .android-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 3;
      height: 14px;
      display: grid;
      place-items: center;
      background: transparent;
    }

    .android-nav span {
      width: 68px;
      height: 3px;
      border-radius: 999px;
      background: #111827;
      opacity: .9;
    }

    .control-lane {
      height: calc(100vh - 28px);
      overflow-y: auto;
      align-content: start;
      display: grid;
      gap: 14px;
      padding-right: 4px;
    }

    .control-toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      min-height: 40px;
    }

    .control-lane::-webkit-scrollbar { width: 10px; }

    .control-lane::-webkit-scrollbar-thumb {
      border: 2px solid #eef4fb;
      border-radius: 999px;
      background: #c7d2e0;
    }

    .panel,
    .metric {
      border: 1px solid var(--gc-border);
      border-radius: 8px;
      background: var(--gc-surface);
      box-shadow: 0 10px 26px rgba(16, 24, 40, .06);
    }

    .panel {
      padding: 16px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel h2 {
      margin: 0;
      color: var(--gc-text);
      font-size: 15px;
      letter-spacing: 0;
    }

    .panel-note {
      margin: 0;
      color: var(--gc-muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: right;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      min-height: 76px;
      padding: 12px;
      box-shadow: none;
      background: var(--gc-surface-soft);
    }

    .metric label {
      display: block;
      margin-bottom: 8px;
      color: var(--gc-muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      color: var(--gc-text);
      font-size: 14px;
      line-height: 1.25;
      word-break: break-word;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--gc-muted);
      font-size: 12px;
    }

    .field select,
    .field input {
      width: 100%;
      height: 38px;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      color: var(--gc-text);
      background: #fff;
      outline: none;
    }

    .field select:focus,
    .field input:focus {
      border-color: rgba(23, 112, 230, .75);
      box-shadow: 0 0 0 3px rgba(23, 112, 230, .12);
    }

    .fault-config {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .tab-field {
      display: grid;
      gap: 8px;
    }

    .field-label {
      color: var(--gc-muted);
      font-size: 12px;
      font-weight: 800;
    }

    .tab-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tab-button {
      min-height: 34px;
      padding: 7px 12px;
      border-color: var(--gc-border);
      border-radius: 999px;
      color: var(--gc-text);
      background: #fff;
      box-shadow: none;
      font-size: 12px;
      font-weight: 900;
      text-align: left;
    }

    .tab-button:hover {
      transform: none;
      box-shadow: 0 8px 18px rgba(16, 24, 40, .08);
    }

    .tab-button[aria-selected="true"] {
      border-color: var(--gc-primary);
      color: #fff;
      background: var(--gc-primary);
      box-shadow: 0 10px 22px rgba(23, 112, 230, .2);
    }

    .scenario-tab-list .tab-button {
      flex: 1 1 220px;
      justify-content: flex-start;
      border-radius: 8px;
      white-space: normal;
      line-height: 1.35;
    }

    .layer-tab-list .tab-button {
      min-width: 0;
      flex: 1 1 90px;
      justify-content: center;
      border-radius: 8px;
      text-align: center;
      white-space: normal;
      line-height: 1.25;
    }

    .tab-button:disabled {
      cursor: wait;
      opacity: .58;
      transform: none;
    }

    .fault-detail,
    .active-fault-card,
    .trace-link-card {
      border: 1px solid var(--gc-border);
      border-radius: 8px;
      background: var(--gc-surface-soft);
    }

    .fault-detail {
      grid-column: 1 / -1;
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .fault-detail-head,
    .active-fault-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .fault-detail strong,
    .active-fault-name {
      color: var(--gc-ink);
      font-size: 14px;
      font-weight: 900;
    }

    .fault-detail span,
    .active-fault-detail {
      color: var(--gc-muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .fault-detail code,
    .active-fault-card code {
      display: inline-flex;
      max-width: 100%;
      padding: 4px 8px;
      border-radius: 999px;
      color: #0f3b6d;
      background: var(--gc-primary-soft);
      font-family: Consolas, Menlo, monospace;
      font-size: 11px;
      word-break: break-word;
      white-space: normal;
    }

    .fault-meta,
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .fault-observation {
      padding: 10px;
      border: 1px dashed var(--gc-border-strong);
      border-radius: 8px;
      color: var(--gc-muted);
      background: #fff;
      font-size: 12px;
      line-height: 1.6;
    }

    .active-fault-card {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      padding: 12px;
    }

    .active-fault-card.active {
      border-color: #fecaca;
      background: #fff5f5;
    }

    .active-fault-title {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--gc-muted);
      font-size: 12px;
      font-weight: 900;
    }

    .trace-link-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 14px;
    }

    .trace-link-card h2 {
      margin: 0 0 5px;
      color: var(--gc-ink);
      font-size: 16px;
    }

    .trace-link-card p {
      margin: 0;
      color: var(--gc-muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .trace-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 15px;
      border-radius: 8px;
      color: #fff;
      background: var(--gc-primary);
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(23, 112, 230, .18);
    }

    .trace-link.disabled {
      pointer-events: none;
      color: var(--gc-muted);
      background: #eef4ff;
      box-shadow: none;
    }

    @media (max-width: 1260px) {
      .demo-grid,
      .control-grid {
        grid-template-columns: 1fr;
      }

      .shop-lane {
        position: static;
        height: 820px;
      }

      .phone-shell {
        width: auto;
        max-width: min(100%, 378px);
      }

      .control-lane {
        height: auto;
        overflow: visible;
        padding-right: 0;
      }
    }

    @media (max-width: 720px) {
      .panel-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .control-toolbar { justify-content: flex-start; }
      .page {
        height: auto;
        min-height: 100vh;
        overflow: visible;
        padding: 12px;
      }
      .phone-shell {
        max-width: min(100%, 350px);
        border-radius: 30px;
      }
      .shop-lane { height: 760px; }
      .phone-screen { border-radius: 27px; }
      .fault-config { grid-template-columns: 1fr; }
      .panel-note { text-align: left; }
      .trace-link-card { grid-template-columns: 1fr; }
      .trace-link { width: 100%; }
    }
  </style>
  <style id="workbench-v2">
    html,
    body { height: 100%; }

    body { overflow: hidden; }

    .app-shell {
      height: 100vh;
      min-height: 0;
      grid-template-rows: 56px minmax(0, 1fr);
    }

    .workbench-header {
      position: relative;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
      padding: 0 16px;
      border-bottom: 1px solid var(--gc-border);
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 4px 16px rgba(16, 24, 40, .05);
      backdrop-filter: blur(12px);
    }

    .workbench-brand,
    .workbench-actions,
    .sidebar-title,
    .scene-status,
    .simulator-title,
    .preview-toggle {
      display: flex;
      align-items: center;
    }

    .workbench-brand { min-width: 0; gap: 0; }

    .workbench-mark,
    .scene-mark {
      position: relative;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #fff;
      background: linear-gradient(145deg, #ff7a00, #ff3856 58%, #d730ff);
      box-shadow: 0 8px 18px rgba(255, 56, 86, .2);
    }

    .service-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 9px;
      color: #fff;
      background: linear-gradient(145deg, #ff7a00, #ff3856 58%, #d730ff);
      box-shadow: 0 8px 18px rgba(255, 56, 86, .2);
    }

    .service-icon svg { width: 100%; height: 100%; display: block; }
    .service-icon path { fill: currentColor; }

    .workbench-mark {
      width: 34px;
      height: 34px;
      border-radius: 9px;
    }

    .workbench-mark::before,
    .scene-mark::before {
      content: "";
      width: 18px;
      height: 14px;
      border: 2px solid currentColor;
      border-top: 0;
      border-radius: 2px 2px 5px 5px;
      box-shadow: inset 7px 0 0 -5px currentColor;
    }

    .workbench-brand-copy { min-width: 0; }

    .workbench-brand-copy strong {
      display: block;
      overflow: hidden;
      color: var(--gc-ink);
      font-size: 17px;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workbench-brand-copy span {
      display: block;
      margin-top: 3px;
      color: var(--gc-muted);
      font-size: 11px;
    }

    .workbench-actions { gap: 8px; }

    .mobile-drawer-button {
      display: none;
      width: 34px;
      min-height: 34px;
      padding: 0;
      color: var(--gc-text);
      background: #fff;
      border-color: var(--gc-border);
      box-shadow: none;
      font-size: 0;
    }

    #mobileScenesBtn::before {
      content: "";
      width: 15px;
      height: 12px;
      border: 2px solid currentColor;
      border-top: 0;
      border-radius: 2px 2px 4px 4px;
      box-shadow: inset 6px 0 0 -4px currentColor;
    }

    #mobileFaultsBtn::before { content: "!"; font-size: 16px; font-weight: 900; line-height: 1; }

    .workbench-main {
      min-height: 0;
      padding: 10px;
      overflow: hidden;
    }

    .workbench-grid {
      --left-column: clamp(220px, 16vw, 260px);
      --right-column: clamp(330px, 24vw, 380px);
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: var(--left-column) minmax(0, 1fr) var(--right-column);
      gap: 10px;
      transition: grid-template-columns .2s ease;
    }

    html[data-left-collapsed="true"] .workbench-grid { --left-column: 48px; }
    html[data-right-collapsed="true"] .workbench-grid { --right-column: 48px; }

    .workspace-pane {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--gc-border);
      border-radius: 8px;
      background: var(--gc-surface);
      box-shadow: 0 10px 28px rgba(16, 24, 40, .06);
    }

    .sidebar-head,
    .simulator-head {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 11px;
      border-bottom: 1px solid var(--gc-border);
      background: #fff;
    }

    .sidebar-title { min-width: 0; gap: 8px; }

    .sidebar-title strong,
    .simulator-title strong {
      color: var(--gc-ink);
      font-size: 14px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .sidebar-title span,
    .simulator-title span {
      color: var(--gc-muted);
      font-size: 10px;
      white-space: nowrap;
    }

    .sidebar-heading-copy,
    .simulator-heading-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .collapse-button {
      position: relative;
      width: 28px;
      min-width: 28px;
      min-height: 28px;
      padding: 0;
      border-color: var(--gc-border);
      color: var(--gc-text);
      background: #fff;
      box-shadow: none;
    }

    .collapse-button::before {
      content: "";
      width: 7px;
      height: 7px;
      display: block;
      margin: auto;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
      transform: rotate(-135deg);
      transition: transform .18s ease;
    }

    #rightCollapseBtn::before { transform: rotate(45deg); }
    html[data-left-collapsed="true"] #leftCollapseBtn::before { transform: rotate(45deg); }
    html[data-right-collapsed="true"] #rightCollapseBtn::before { transform: rotate(-135deg); }

    .sidebar-content {
      min-height: 0;
      height: calc(100% - 52px);
      overflow-y: auto;
    }

    .scene-sidebar { grid-column: 1; }

    .scene-list {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .scene-item {
      width: 100%;
      min-height: 94px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      align-items: start;
      gap: 10px;
      padding: 11px;
      border: 1px solid var(--gc-border);

    .scene-item.active {

    }

    .fault-console-mark {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 7px;
      color: #fff;
      background: var(--gc-primary);
      font-size: 14px;
      font-weight: 900;
    }

    .fault-console-mark::before { content: "!"; }

    html[data-left-collapsed="true"] .scene-sidebar .sidebar-heading-copy,
    html[data-right-collapsed="true"] .control-sidebar .sidebar-heading-copy { display: none; }

    html[data-left-collapsed="true"] .scene-sidebar .sidebar-title,
    html[data-right-collapsed="true"] .control-sidebar .sidebar-title { display: none; }

    html[data-left-collapsed="true"] .scene-sidebar .sidebar-head,
    html[data-right-collapsed="true"] .control-sidebar .sidebar-head { justify-content: center; padding-inline: 6px; }

    html[data-left-collapsed="true"] .scene-sidebar .sidebar-content,
    html[data-right-collapsed="true"] .control-sidebar .sidebar-content { display: none; }

    html[data-left-collapsed="true"] .scene-sidebar .sidebar-rail,
    html[data-right-collapsed="true"] .control-sidebar .sidebar-rail { display: grid; }

    .simulator-pane {
      grid-column: 2;
      display: grid;
      grid-template-rows: 52px minmax(0, 1fr);
    }

    .simulator-title { min-width: 0; gap: 9px; }
    .simulator-scene-mark { width: 28px; height: 28px; border-radius: 7px; }

    .preview-toggle {
      flex: 0 0 auto;
      gap: 3px;
      padding: 3px;
      border: 1px solid var(--gc-border);
      border-radius: 8px;
      background: #f7f9fc;
    }

    .preview-toggle button {
      min-height: 32px;
      padding: 6px 10px;
      border-radius: 6px;

      box-shadow: none;

    }

    .preview-toggle button.active {

      background: var(--gc-primary);

    .preview-stage {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: stretch;
      gap: 10px;
      padding: 10px;
      overflow: hidden;
      background: #fff;
    }

    .preview-stage[data-view="web"] {
      grid-template-rows: minmax(0, 1fr) clamp(160px, 21vh, 190px);
    }

    .preview-shell.phone-shell {
      position: relative;
      min-width: 0;
      min-height: 0;
      max-width: none;
      transition: width .2s ease, height .2s ease, border-radius .2s ease;
    }

    .preview-stage[data-view="web"] .preview-shell.phone-shell {
      width: 100%;
      height: 100%;
      aspect-ratio: auto;
      display: grid;
      grid-template-rows: 44px minmax(0, 1fr);
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: #fff;
      box-shadow: none;
      overflow: hidden;
      isolation: isolate;
    }

    .preview-browser-chrome {
      min-width: 0;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid #aebdce;
      color: #65758b;
      background: #edf2f7;
    }

    .preview-stage[data-view="web"] .preview-browser-chrome { display: flex; }

    .preview-browser-lights {
      display: flex;
      flex: 0 0 auto;
      gap: 5px;
    }

    .preview-browser-lights i {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #ff5f57;
    }

    .preview-browser-lights i:nth-child(2) { background: #febc2e; }
    .preview-browser-lights i:nth-child(3) { background: #28c840; }

    .preview-browser-tools {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 2px;
    }

    .preview-browser-tool {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      color: #65758b;
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
    }

    .preview-browser-tool.muted { color: #aab4c2; }

    .preview-browser-address {
      min-width: 0;
      height: 28px;
      display: flex;
      align-items: center;
      flex: 1;
      gap: 7px;
      padding: 0 10px;
      overflow: hidden;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      color: var(--gc-muted);
      background: #fff;
      font-size: 11px;
    }

    .preview-browser-address::before {
      content: "";
      width: 6px;
      height: 6px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--gc-success);
    }

    .preview-browser-address span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-stage[data-view="web"] .preview-shell.phone-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 10;
      border: 2px solid #91a2b8;
      border-radius: 8px;
      pointer-events: none;
    }

    .preview-stage[data-view="web"] .phone-screen { min-height: 0; border: 0; border-radius: 6px; overflow: hidden; background: #fff; box-shadow: none; }
    .preview-stage[data-view="web"] .phone-camera,
    .preview-stage[data-view="web"] .phone-statusbar,
    .preview-stage[data-view="web"] .android-nav { display: none; }
    .preview-stage[data-view="web"] .phone-frame-wrap { height: 100%; overflow: hidden; background: #fff; }

    .preview-stage[data-view="mobile"] {
      grid-template-columns: minmax(280px, 390px) minmax(280px, 1fr);
      grid-template-rows: minmax(0, 1fr);
      place-items: stretch;
      justify-content: stretch;
      padding-left: max(10px, calc((100% - 790px) / 2));
    }

    .preview-stage[data-view="mobile"] .preview-shell.phone-shell {
      width: auto;
      max-width: 100%;
      height: 100%;
      justify-self: center;
    }

    .fault-history {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid #cbd6e4;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(16, 24, 40, .08);
    }

    .fault-history-head {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--gc-border);
    }

    .fault-history-head h2 {
      margin: 0;
      color: var(--gc-ink);
      font-size: 13px;
      line-height: 1.25;
    }

    .fault-history-count {
      color: var(--gc-muted);
      font-size: 10px;
      white-space: nowrap;
    }

    .fault-history-list {
      min-height: 0;
      overflow: auto;
      padding: 0 12px;
    }

    .fault-history-empty {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--gc-muted);
      font-size: 11px;
      text-align: center;
    }

    .fault-record {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr);
      gap: 9px;
      padding: 9px 0;
      border-bottom: 1px solid #edf1f6;
    }

    .fault-record:last-child { border-bottom: 0; }

    .fault-record-dot {
      width: 9px;
      height: 9px;
      margin-top: 4px;
      border: 2px solid #bfdbfe;
      border-radius: 999px;
      background: var(--gc-primary);
    }

    .fault-record[data-status="active"] .fault-record-dot { border-color: #bbf7d0; background: var(--gc-success); }
    .fault-record[data-status="closed"] .fault-record-dot { border-color: #dbe4ee; background: #7b8ba1; }
    .fault-record[data-status="failed"] .fault-record-dot { border-color: #fecaca; background: var(--gc-danger); }

    .fault-record-copy { min-width: 0; display: grid; gap: 4px; }

    .fault-record-title-row,
    .fault-record-meta {
      min-width: 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px 10px;
    }

    .fault-record-title-row { justify-content: space-between; }

    .fault-record-title {
      min-width: 0;
      overflow: hidden;
      color: var(--gc-ink);
      font-size: 11px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fault-record-status {
      flex: 0 0 auto;
      padding: 2px 6px;
      border-radius: 999px;
      color: #0f4c81;
      background: #eaf4ff;
      font-size: 9px;
      font-weight: 800;
    }

    .fault-record[data-status="active"] .fault-record-status { color: #08724f; background: #e8f8f1; }
    .fault-record[data-status="closed"] .fault-record-status { color: #526174; background: #eef2f6; }
    .fault-record[data-status="failed"] .fault-record-status { color: #a5222e; background: #fff0f1; }

    .fault-record-meta {
      color: var(--gc-muted);
      font-size: 9px;
      line-height: 1.35;
    }

    .fault-record-meta span + span::before {
      content: "·";
      margin-right: 10px;
      color: #b3bfcd;
    }

    .preview-stage[data-view="web"] .fault-history { width: 100%; }
    .preview-stage[data-view="mobile"] .fault-history { width: 100%; height: 100%; }

    .control-sidebar.control-lane {
      grid-column: 3;
      height: 100%;
      display: block;
      padding: 0;
      overflow: hidden;
      background: #fff;
    }

    .control-sidebar .sidebar-content {
      padding: 0;
      background: #fff;
    }

    .control-sidebar .panel,
    .control-sidebar .trace-link-card {
      border: 0;
      border-radius: 0;
      box-shadow: none;
      background: #fff;
    }

    .control-sidebar .panel { padding: 14px 12px; }
    .control-sidebar .panel-head { gap: 8px; }
    .control-sidebar .panel-head h2 { font-size: 14px; }
    .control-sidebar .panel-note { font-size: 10px; }
    .control-sidebar .tab-button { padding: 7px 8px; font-size: 10px; }
    .control-sidebar .fault-config { gap: 10px; }
    .control-sidebar .fault-detail {
      padding: 12px 0 0;
      border: 0;
      border-top: 1px solid var(--gc-border);
      border-radius: 0;
      background: #fff;
    }
    .control-sidebar .fault-detail-head { align-items: flex-start; }
    .control-sidebar .fault-detail-head strong { font-size: 12px; }
    .control-sidebar .fault-detail > span,
    .control-sidebar .fault-observation,
    .control-sidebar .active-fault-detail { font-size: 10px; line-height: 1.45; }
    .control-sidebar .fault-meta { gap: 4px; }
    .control-sidebar .fault-meta code { font-size: 9px; }
    .control-sidebar .fault-observation {
      padding: 9px 0 0;
      border: 0;
      border-top: 1px dashed var(--gc-border);
      border-radius: 0;
      background: #fff;
    }
    .control-sidebar .active-fault-card,
    .control-sidebar .active-fault-card.active {
      margin-top: 12px;
      padding: 12px 0 0;
      border: 0;
      border-top: 1px solid var(--gc-border);
      border-radius: 0;
      background: #fff;
    }
    .control-sidebar .active-fault-name { font-size: 12px; }
    .control-sidebar .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .control-sidebar .button-row button { min-height: 38px; padding: 8px; font-size: 11px; }
    .control-sidebar .trace-link-card {
      margin-top: 0;
      padding: 14px 12px;
      grid-template-columns: 1fr;
      gap: 9px;
      border-top: 1px solid var(--gc-border);
    }
    .control-sidebar .trace-link-card h2 { font-size: 13px; }
    .control-sidebar .trace-link-card p { font-size: 10px; }
    .control-sidebar .trace-link { width: 100%; min-height: 36px; padding: 8px; font-size: 11px; }

    .drawer-backdrop {
      display: none;
      position: fixed;
      inset: 56px 0 0;
      z-index: 45;
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: rgba(15, 23, 42, .34);
      box-shadow: none;
      transform: none;
    }

    .drawer-backdrop:hover { filter: none; transform: none; box-shadow: none; }

    @media (max-width: 1199px) {
      .workbench-grid { --left-column: 48px; --right-column: 48px; }
      .scene-sidebar .sidebar-heading-copy,
      .control-sidebar .sidebar-heading-copy,
      .scene-sidebar .sidebar-content,
      .control-sidebar .sidebar-content { display: none; }
      .scene-sidebar .sidebar-title,
      .control-sidebar .sidebar-title { display: none; }
      .scene-sidebar .sidebar-head,
      .control-sidebar .sidebar-head { justify-content: center; padding-inline: 6px; }
      .scene-sidebar .sidebar-rail,
      .control-sidebar .sidebar-rail { display: grid; }
      #leftCollapseBtn::before { transform: rotate(45deg); }
      #rightCollapseBtn::before { transform: rotate(-135deg); }
      body[data-left-drawer-open="true"] #leftCollapseBtn::before { transform: rotate(-135deg); }
      body[data-right-drawer-open="true"] #rightCollapseBtn::before { transform: rotate(45deg); }
      .scene-sidebar,
      .control-sidebar { z-index: 46; }
      body[data-left-drawer-open="true"] .scene-sidebar,
      body[data-right-drawer-open="true"] .control-sidebar {
        position: absolute;
        top: 0;
        bottom: 0;
        width: min(340px, calc(100vw - 90px));
      }
      body[data-left-drawer-open="true"] .scene-sidebar { left: 0; }
      body[data-right-drawer-open="true"] .control-sidebar { right: 0; }
      body[data-left-drawer-open="true"] .scene-sidebar .sidebar-heading-copy,
      body[data-right-drawer-open="true"] .control-sidebar .sidebar-heading-copy { display: grid; }
      body[data-left-drawer-open="true"] .scene-sidebar .sidebar-title,
      body[data-right-drawer-open="true"] .control-sidebar .sidebar-title { display: flex; }
      body[data-left-drawer-open="true"] .scene-sidebar .sidebar-content,
      body[data-right-drawer-open="true"] .control-sidebar .sidebar-content { display: block; }
      body[data-left-drawer-open="true"] .scene-sidebar .sidebar-rail,
      body[data-right-drawer-open="true"] .control-sidebar .sidebar-rail { display: none; }
      body[data-left-drawer-open="true"] .scene-sidebar .sidebar-head,
      body[data-right-drawer-open="true"] .control-sidebar .sidebar-head { justify-content: space-between; padding-inline: 11px; }
      body[data-left-drawer-open="true"] .drawer-backdrop,
      body[data-right-drawer-open="true"] .drawer-backdrop { display: block; }
    }

    @media (max-width: 819px) {
      .workbench-header { padding-inline: 10px; }
      .workbench-brand-copy span { display: none; }
      .workbench-brand-copy strong { max-width: 48vw; font-size: 14px; }
      .mobile-drawer-button { display: grid; place-items: center; }
      .language-toggle button { padding-inline: 7px; }
      .workbench-main { padding: 8px; }
      .workbench-grid { display: block; }
      .simulator-pane { width: 100%; height: 100%; }
      .scene-sidebar,
      .control-sidebar.control-lane {
        position: fixed;
        top: 56px;
        bottom: 0;
        z-index: 55;
        width: min(360px, calc(100vw - 36px));
        height: auto;
        transform: translateX(-110%);
        transition: transform .2s ease;
      }
      .scene-sidebar { left: 0; }
      .control-sidebar.control-lane { right: 0; transform: translateX(110%); }
      body[data-left-drawer-open="true"] .scene-sidebar,
      body[data-right-drawer-open="true"] .control-sidebar.control-lane { transform: translateX(0); }
      .drawer-backdrop { inset: 56px 0 0; z-index: 50; }
      .simulator-head { min-height: 50px; padding: 7px 9px; }
      .simulator-heading-copy span { display: none; }
      .preview-toggle button { padding-inline: 8px; }
      .preview-stage { padding: 6px; }
    }

    @media (max-width: 700px) {
      .preview-stage[data-view="mobile"] {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) 170px;
        padding-left: 6px;
      }

      .preview-stage[data-view="mobile"] .preview-shell.phone-shell {
        max-height: 100%;
        max-width: min(100%, 390px);
      }
    }

    @media (max-width: 520px) {
      .workbench-brand-copy strong { max-width: 34vw; }
      .preview-toggle button { min-height: 30px; padding: 5px 6px; font-size: 10px; }
      .preview-stage[data-view="mobile"] .preview-shell.phone-shell { max-height: 100%; max-width: min(100%, 390px); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="workbench-header">
      <div class="workbench-brand">
        <span class="workbench-brand-copy">
          <strong data-i18n="workbenchTitle">故障演练工作台 Demo</strong>
          <span data-i18n="workbenchBadge">业务场景演练</span>
        </span>
      </div>
      <div class="workbench-actions">
        <button class="mobile-drawer-button" id="mobileScenesBtn" type="button" aria-label="展开业务场景" data-i18n-aria-label="expandScenes" title="业务场景">S</button>
        <button class="mobile-drawer-button" id="mobileFaultsBtn" type="button" aria-label="展开故障控制台" data-i18n-aria-label="expandFaults" title="故障控制台">F</button>
        <div class="language-toggle" aria-label="语言" data-i18n-aria-label="commonLanguage">
          <button type="button" data-lang="zh">中文</button>
          <button type="button" data-lang="en">English</button>
        </div>
      </div>
    </header>

    <main class="workbench-main">
      <section class="workbench-grid" id="workbenchGrid">
        <aside class="workspace-pane scene-sidebar" id="sceneSidebar" aria-label="业务场景" data-i18n-aria-label="businessScenes">

            <div class="sidebar-title">
              <span class="sidebar-heading-copy">
                <strong data-i18n="businessScenes">业务场景</strong>
                <span data-i18n="businessSceneCount">1 个场景</span>
              </span>
            </div>
            <button class="collapse-button" id="leftCollapseBtn" type="button" aria-expanded="true" aria-label="收起业务场景" data-i18n-aria-label="collapseScenes"></button>
          </div>
          <div class="sidebar-content">
            <div class="scene-list" id="businessSceneList"></div>
          </div>

            <button class="rail-button active" id="bookstoreRailBtn" type="button" title="图书商城">
              <span class="service-icon service-icon-bookstore" aria-hidden="true">
                <svg viewBox="0 0 40 40" focusable="false">
                  <path d="M8.5 11.5c4.2 0 7.5 1.1 10.5 3.5v13.5c-3-2.3-6.3-3.5-10.5-3.5V11.5Zm23 0c-4.2 0-7.5 1.1-10.5 3.5v13.5c3-2.3 6.3-3.5 10.5-3.5V11.5Z"></path>
                </svg>
              </span>
              <span class="dot" aria-hidden="true"></span>
            </button>
          </div>
        </aside>

        <section class="workspace-pane simulator-pane" aria-label="业务场景模拟器" data-i18n-aria-label="simulatorTitle">

              </span>
            </div>
            <div class="preview-toggle" id="previewToggle" role="tablist" aria-label="预览模式">
              <button type="button" role="tab" data-preview-mode="web" aria-selected="true" data-i18n="previewWeb">Web 预览</button>
              <button type="button" role="tab" data-preview-mode="mobile" aria-selected="false" data-i18n="previewMobile">移动端</button>
            </div>
          </div>

          <div class="preview-stage" id="previewStage" data-view="web">
            <div class="preview-shell phone-shell" id="previewShell">
              <div class="preview-browser-chrome" aria-label="demo.local/bookstore" data-i18n-aria-label="browserAddress">
                <span class="preview-browser-lights" aria-hidden="true"><i></i><i></i><i></i></span>
                <span class="preview-browser-tools" aria-hidden="true">
                  <span class="preview-browser-tool muted">‹</span>
                  <span class="preview-browser-tool muted">›</span>
                  <span class="preview-browser-tool">↻</span>
                </span>
                <span class="preview-browser-address"><span data-i18n="browserAddress">demo.local/bookstore</span></span>
              </div>
              <div class="phone-screen">
                <div class="phone-camera" aria-hidden="true"></div>
                <div class="phone-statusbar">
                  <span>09:41</span>
                  <span class="phone-icons" aria-hidden="true">
                    <span class="signal"><i></i><i></i><i></i></span>
                    <svg class="wifi" viewBox="0 5 24 15" aria-hidden="true">
                      <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z"></path>
                      <path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"></path>
                      <path d="M9 17l3 3l3-3c-1.65-1.66-4.34-1.66-6 0z"></path>
                    </svg>
                    <span class="battery"></span>
                  </span>
                </div>
                <div class="phone-frame-wrap">
                  <iframe id="shopFrame" class="shop-frame" title="商城 Demo" data-i18n-title="sceneBookstoreTitle"></iframe>
                </div>

              </div>
            </div>
            <section class="fault-history" aria-label="最近故障注入记录" data-i18n-aria-label="faultHistoryTitle">
              <div class="fault-history-head">
                <h2 data-i18n="faultHistoryTitle">最近故障注入记录</h2>
                <span class="fault-history-count" id="faultHistoryCount">0 条记录</span>
              </div>
              <div class="fault-history-list" id="faultHistoryList" aria-live="polite"></div>
            </section>
          </div>
        </section>

        <aside class="workspace-pane control-sidebar control-lane" id="controlSidebar" aria-label="故障注入控制台" data-i18n-aria-label="faultConsoleTitle">
          <div class="sidebar-head">
            <div class="sidebar-title">
              <span class="sidebar-heading-copy">
                <strong data-i18n="faultConsoleTitle">故障注入控制台</strong>
                <span id="lastRefresh" data-i18n="parentLastRefresh">未刷新</span>
              </span>
            </div>
            <button class="collapse-button" id="rightCollapseBtn" type="button" aria-expanded="true" aria-label="收起故障控制台" data-i18n-aria-label="collapseFaults"></button>
          </div>
          <div class="sidebar-content">
            <section class="panel" aria-label="多层级故障配置" data-i18n-aria-label="parentFaultPanel">
            <div class="panel-head">
              <h2 data-i18n="parentFaultPanel">多层级故障配置</h2>
            </div>
            <div class="fault-config">
              <div class="tab-field">
                <span class="field-label" id="faultLayerLabel" data-i18n="parentLayerLabel">故障层级</span>
                <div class="tab-list layer-tab-list" id="faultLayerTabs" role="tablist" aria-labelledby="faultLayerLabel"></div>
              </div>
              <div class="tab-field">
                <span class="field-label" id="faultScenarioLabel" data-i18n="parentScenarioLabel">具体故障</span>
                <div class="tab-list scenario-tab-list" id="faultScenarioTabs" role="tablist" aria-labelledby="faultScenarioLabel"></div>

                <div class="fault-detail-head">
                  <strong id="faultDetailTitle" data-i18n="parentFaultLoadingTitle">故障目录加载中</strong>
                  <code id="faultDetailKind">-</code>
                </div>
                <span id="faultDetailDesc" data-i18n="parentFaultLoadingDesc">正在读取可注入的故障场景。</span>
                <div class="fault-meta">
                  <code id="faultDetailService">service=-</code>
                  <code id="faultDetailTarget">target=-</code>
                  <code id="faultDetailTtl">ttl=-</code>
                </div>
                <div class="fault-observation" id="faultObservation" data-i18n="parentObservationLoading">观察信息加载中。</div>
              </article>
            </div>
            <div class="active-fault-card" id="activeFaultCard">
              <div class="active-fault-head">
                <span class="active-fault-title"><span class="dot" id="activeFaultDot"></span><span data-i18n="parentActiveFault">当前注入异常</span></span>
                <code id="activeFaultCode">none</code>
              </div>
              <div class="active-fault-name" id="activeFaultName" data-i18n="parentNoFault">未注入异常</div>
              <div class="active-fault-detail" id="activeFaultDetail" data-i18n="parentNoFaultDetail">右侧选择故障并点击注入；一次只保留一个异常。</div>
            </div>

              <button class="danger" id="faultBtn" type="button" data-i18n="parentInjectFault">注入选中故障</button>
              <button class="warn" id="recoverBtn" type="button" data-i18n="parentRecoverFault">关闭全部故障</button>
            </div>

            <section class="trace-link-card" aria-label="链路详情" data-i18n-aria-label="parentTraceLinkPanel">
              <div>
                <h2 data-i18n="parentTraceLinkPanel">链路详情</h2>
                <p id="traceLinkHint" data-i18n="parentTraceLinkPending">购买成功并匹配到 trace_id 后，可查看对应链路详情。</p>
              </div>
              <a id="observabilityTraceLink" class="trace-link disabled" href="#" target="_blank" rel="noopener noreferrer" aria-disabled="true" data-i18n="parentTraceLinkOpen">打开链路详情</a>
            </section>
          </div>
