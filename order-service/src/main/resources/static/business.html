      </section>
    </main>
    <button class="drawer-backdrop" id="drawerBackdrop" type="button" aria-label="关闭侧栏"></button>
  </div>

  <script>
    const I18N = window.SelfhealI18n;
    const apiPrefix = window.location.pathname.startsWith('/selfheal') ? '/selfheal' : '';
    const STATUS_REFRESH_INTERVAL_MS = 60000;
    const SHOP_BUILD_ID = '20260714-workbench-v19';
    const LAYOUT_STORAGE_KEYS = {
      left: 'mall-workbench-left-collapsed',
      right: 'mall-workbench-right-collapsed',
    };
    const BUSINESS_SCENARIOS = [
      {
        id: 'bookstore',
        titleKey: 'sceneBookstoreTitle',
        descriptionKey: 'sceneBookstoreDescription',
        frameUrl: 'shop.html',
        supportedViews: ['web', 'mobile'],
        statusKey: 'sceneRunning',
      },
    ];
    const compactViewport = window.matchMedia('(max-width: 1199px)');
    const initialUrl = new URL(window.location.href);
    const CONTROL_TOKEN_STORAGE_KEY = 'observability-demo-control-token';
    const FAULT_LAYER_GROUPS = [
      { id: 'frontend', layers: ['frontend'], labelKey: 'layerFrontend' },
      { id: 'backend', layers: ['service'], labelKey: 'layerBackend' },
      { id: 'infrastructure', layers: ['dependency', 'jvm'], labelKey: 'layerInfrastructure' },
    ];

    function initialSceneId() {
      const requested = initialUrl.searchParams.get('scene');
      return BUSINESS_SCENARIOS.some((scene) => scene.id === requested) ? requested : BUSINESS_SCENARIOS[0].id;
    }

    function initialPreviewMode(sceneId) {
      const scene = BUSINESS_SCENARIOS.find((item) => item.id === sceneId) || BUSINESS_SCENARIOS[0];
      const requested = initialUrl.searchParams.get('view');
      return scene.supportedViews.includes(requested) ? requested : scene.supportedViews[0];
    }

    const initialSelectedSceneId = initialSceneId();

    const state = {
      busy: false,
      faults: [],
      selectedFaultLayer: '',
      selectedFaultId: '',
      faultMode: 'none',
      activeClientFault: null,
      language: I18N.setLanguage(I18N.detectLanguage(), { updateUrl: true }),
      shopReady: false,
      lastTraceIds: [],
      traceLookupSeq: 0,
      faultRecords: [],
      activeFaultRecordId: '',
      countedFaultTriggerIds: [],
      leftCollapsed: document.documentElement.dataset.leftCollapsed === 'true',
      rightCollapsed: document.documentElement.dataset.rightCollapsed === 'true',
      leftDrawerOpen: false,
      rightDrawerOpen: false,
      selectedSceneId: initialSelectedSceneId,
      previewMode: initialPreviewMode(initialSelectedSceneId),
      demoConfig: {},
    };

    const els = {
      shopFrame: document.getElementById('shopFrame'),
      previewStage: document.getElementById('previewStage'),
      previewToggle: document.getElementById('previewToggle'),
      simulatorSceneName: document.getElementById('simulatorSceneName'),
      faultHistoryList: document.getElementById('faultHistoryList'),
      faultHistoryCount: document.getElementById('faultHistoryCount'),
      businessSceneList: document.getElementById('businessSceneList'),
      bookstoreRailBtn: document.getElementById('bookstoreRailBtn'),
      leftCollapseBtn: document.getElementById('leftCollapseBtn'),
      rightCollapseBtn: document.getElementById('rightCollapseBtn'),
      mobileScenesBtn: document.getElementById('mobileScenesBtn'),
      mobileFaultsBtn: document.getElementById('mobileFaultsBtn'),
      drawerBackdrop: document.getElementById('drawerBackdrop'),
      openShopLink: document.getElementById('openShopLink'),
      logs: document.getElementById('logs'),
      rumStatus: document.getElementById('rumStatus'),
      rumDot: document.getElementById('rumDot'),
      lastRefresh: document.getElementById('lastRefresh'),
      orderHealth: document.getElementById('orderHealth'),
      inventoryHealth: document.getElementById('inventoryHealth'),
      paymentHealth: document.getElementById('paymentHealth'),
      traceLinkHint: document.getElementById('traceLinkHint'),
      observabilityTraceLink: document.getElementById('observabilityTraceLink'),
      faultLayerTabs: document.getElementById('faultLayerTabs'),
      faultScenarioTabs: document.getElementById('faultScenarioTabs'),
      faultDetailTitle: document.getElementById('faultDetailTitle'),
      faultDetailKind: document.getElementById('faultDetailKind'),
      faultDetailDesc: document.getElementById('faultDetailDesc'),
      faultDetailService: document.getElementById('faultDetailService'),
      faultDetailTarget: document.getElementById('faultDetailTarget'),
      faultDetailTtl: document.getElementById('faultDetailTtl'),
      faultObservation: document.getElementById('faultObservation'),
      activeFaultCard: document.getElementById('activeFaultCard'),
      activeFaultDot: document.getElementById('activeFaultDot'),
      activeFaultCode: document.getElementById('activeFaultCode'),
      activeFaultName: document.getElementById('activeFaultName'),
      activeFaultDetail: document.getElementById('activeFaultDetail'),
      faultBtn: document.getElementById('faultBtn'),
      recoverBtn: document.getElementById('recoverBtn'),
      refreshBtn: document.getElementById('refreshBtn'),
    };

    function t(key, params) {
      return I18N.t(key, params, state.language);
    }

    function selectedBusinessScene() {
      return BUSINESS_SCENARIOS.find((scene) => scene.id === state.selectedSceneId) || BUSINESS_SCENARIOS[0];
    }

    function shopUrl(language) {
      const scene = selectedBusinessScene();
      const url = new URL(scene.frameUrl, window.location.href);
      url.searchParams.set('lang', language);
      url.searchParams.set('scene', scene.id);
      url.searchParams.set('view', state.previewMode);
      url.searchParams.set('v', SHOP_BUILD_ID);
      return url.pathname + url.search;
    }

    function setText(element, value) {
      if (element) element.textContent = value;
    }

    function updateFrameUrls() {
      const nextUrl = shopUrl(state.language);
      if (els.openShopLink) els.openShopLink.href = nextUrl;
      if (!els.shopFrame.getAttribute('src') || els.shopFrame.dataset.sceneId !== state.selectedSceneId) {
        els.shopFrame.src = nextUrl;
        els.shopFrame.dataset.sceneId = state.selectedSceneId;
      }
      els.shopFrame.title = t('frameTitle');
    }

    function updateWorkbenchUrl() {
      const url = new URL(window.location.href);
      url.searchParams.set('scene', state.selectedSceneId);
      url.searchParams.set('view', state.previewMode);
      window.history.replaceState({}, '', url);
    }

    function syncPreviewContext() {
      sendShopMessage('set-preview-context', {
        sceneId: state.selectedSceneId,
        view: state.previewMode,
      });
    }

    function createBusinessSceneIcon(sceneId) {
      const mark = document.createElement('span');
      mark.className = `service-icon service-icon-${sceneId}`;
      mark.setAttribute('aria-hidden', 'true');
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 40 40');
      svg.setAttribute('focusable', 'false');
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', 'M8.5 11.5c4.2 0 7.5 1.1 10.5 3.5v13.5c-3-2.3-6.3-3.5-10.5-3.5V11.5Zm23 0c-4.2 0-7.5 1.1-10.5 3.5v13.5c3-2.3 6.3-3.5 10.5-3.5V11.5Z');
      svg.append(path);
      mark.append(svg);
      return mark;
    }

    function renderBusinessScenes() {
      if (!els.businessSceneList) return;
      const items = BUSINESS_SCENARIOS.map((scene) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `scene-item${scene.id === state.selectedSceneId ? ' active' : ''}`;
        button.dataset.sceneId = scene.id;
        button.setAttribute('aria-pressed', scene.id === state.selectedSceneId ? 'true' : 'false');
        button.title = t(scene.titleKey);

        const mark = createBusinessSceneIcon(scene.id);

        const copy = document.createElement('span');
        copy.className = 'scene-copy';
        const title = document.createElement('strong');
        title.textContent = t(scene.titleKey);
        const description = document.createElement('p');
        description.textContent = t(scene.descriptionKey);
        const status = document.createElement('span');
        status.className = 'scene-status';
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.setAttribute('aria-hidden', 'true');
        const statusText = document.createElement('span');
        statusText.textContent = t(scene.statusKey);
        status.append(dot, statusText);
        copy.append(title, description, status);
        button.append(mark, copy);
        return button;
      });
      els.businessSceneList.replaceChildren(...items);
      if (els.bookstoreRailBtn) els.bookstoreRailBtn.title = t('sceneBookstoreTitle');
      if (els.simulatorSceneName) els.simulatorSceneName.textContent = t(selectedBusinessScene().descriptionKey);
    }

    function renderPreviewMode() {
      const scene = selectedBusinessScene();
      if (els.previewStage) els.previewStage.dataset.view = state.previewMode;
      if (!els.previewToggle) return;
      els.previewToggle.querySelectorAll('[data-preview-mode]').forEach((button) => {
        const mode = button.dataset.previewMode;
        const supported = scene.supportedViews.includes(mode);
        button.disabled = !supported;
        button.classList.toggle('active', mode === state.previewMode);
        button.setAttribute('aria-selected', mode === state.previewMode ? 'true' : 'false');
        button.title = supported ? '' : t('previewWebOnly');
      });
    }

    function selectBusinessScene(sceneId) {
      const scene = BUSINESS_SCENARIOS.find((item) => item.id === sceneId);
      if (!scene) return;
      const changed = state.selectedSceneId !== scene.id;
      state.selectedSceneId = scene.id;
      if (!scene.supportedViews.includes(state.previewMode)) {
        state.previewMode = scene.supportedViews[0];
      }
      renderBusinessScenes();
      renderPreviewMode();
      updateWorkbenchUrl();
      if (changed) updateFrameUrls();
      syncPreviewContext();
    }

    function setPreviewMode(mode) {
      const scene = selectedBusinessScene();
      if (!scene.supportedViews.includes(mode) || state.previewMode === mode) return;
      state.previewMode = mode;
      renderPreviewMode();
      updateWorkbenchUrl();
      syncPreviewContext();
    }

    function persistLayoutPreference(side, collapsed) {
      try {
        localStorage.setItem(LAYOUT_STORAGE_KEYS[side], String(collapsed));
      } catch (_) {}
    }

    function renderLayoutState() {
      document.documentElement.dataset.leftCollapsed = state.leftCollapsed ? 'true' : 'false';
      document.documentElement.dataset.rightCollapsed = state.rightCollapsed ? 'true' : 'false';
      document.body.dataset.leftDrawerOpen = state.leftDrawerOpen ? 'true' : 'false';
      document.body.dataset.rightDrawerOpen = state.rightDrawerOpen ? 'true' : 'false';

      const compact = compactViewport.matches;
      const leftExpanded = compact ? state.leftDrawerOpen : !state.leftCollapsed;
      const rightExpanded = compact ? state.rightDrawerOpen : !state.rightCollapsed;
      if (els.leftCollapseBtn) {
        els.leftCollapseBtn.setAttribute('aria-expanded', leftExpanded ? 'true' : 'false');
        els.leftCollapseBtn.setAttribute('aria-label', t(leftExpanded ? 'collapseScenes' : 'expandScenes'));
        els.leftCollapseBtn.title = t(leftExpanded ? 'collapseScenes' : 'expandScenes');
      }
      if (els.rightCollapseBtn) {
        els.rightCollapseBtn.setAttribute('aria-expanded', rightExpanded ? 'true' : 'false');
        els.rightCollapseBtn.setAttribute('aria-label', t(rightExpanded ? 'collapseFaults' : 'expandFaults'));
        els.rightCollapseBtn.title = t(rightExpanded ? 'collapseFaults' : 'expandFaults');
      }
      if (els.mobileScenesBtn) {
        els.mobileScenesBtn.setAttribute('aria-expanded', state.leftDrawerOpen ? 'true' : 'false');
        els.mobileScenesBtn.setAttribute('aria-label', t(state.leftDrawerOpen ? 'collapseScenes' : 'expandScenes'));
        els.mobileScenesBtn.title = t(state.leftDrawerOpen ? 'collapseScenes' : 'expandScenes');
      }
      if (els.mobileFaultsBtn) {
        els.mobileFaultsBtn.setAttribute('aria-expanded', state.rightDrawerOpen ? 'true' : 'false');
        els.mobileFaultsBtn.setAttribute('aria-label', t(state.rightDrawerOpen ? 'collapseFaults' : 'expandFaults'));
        els.mobileFaultsBtn.title = t(state.rightDrawerOpen ? 'collapseFaults' : 'expandFaults');
      }
    }

    function closeDrawers() {
      state.leftDrawerOpen = false;
      state.rightDrawerOpen = false;
      renderLayoutState();
    }

    function toggleSidebar(side) {
      if (compactViewport.matches) {
        if (side === 'left') {
          state.leftDrawerOpen = !state.leftDrawerOpen;
          state.rightDrawerOpen = false;
        } else {
          state.rightDrawerOpen = !state.rightDrawerOpen;
          state.leftDrawerOpen = false;
        }
      } else if (side === 'left') {
        state.leftCollapsed = !state.leftCollapsed;
        persistLayoutPreference('left', state.leftCollapsed);
      } else {
        state.rightCollapsed = !state.rightCollapsed;
        persistLayoutPreference('right', state.rightCollapsed);
      }
      renderLayoutState();
    }


    function createLogEntry(title, message, status) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      if (status) entry.dataset.status = status;

      const head = document.createElement('div');
      head.className = 'log-entry-head';

      const label = document.createElement('span');
      label.className = 'log-entry-title';
      label.textContent = title;

      const time = document.createElement('span');
      time.textContent = new Date().toLocaleTimeString();

      const body = document.createElement('div');
      body.className = 'log-entry-message';
      body.textContent = message;

      head.append(label, time);
      entry.append(head, body);
      return entry;
    }

    function log(message, options = {}) {
      if (!els.logs) return;
      const entry = createLogEntry(options.title || t('shopLogTitle'), message, options.status || 'info');
      els.logs.prepend(entry);
      while (els.logs.children.length > 48) {
        els.logs.removeChild(els.logs.lastElementChild);
      }
    }

    function shortJson(value) {
      const text = typeof value === 'string' ? value : JSON.stringify(value);
      return text && text.length > 520 ? `${text.slice(0, 520)}...` : text;
    }

    function shortId(value) {
      if (!value) return '-';
      return value.length > 18 ? `${value.slice(0, 8)}...${value.slice(-6)}` : value;
    }

    function formatFaultRecordDuration(record) {
      const end = record.endedAt || Date.now();
      const totalSeconds = Math.max(0, Math.floor((end - record.startedAt) / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const parts = hours > 0 ? [hours, minutes, seconds] : [minutes, seconds];
      return parts.map((part) => String(part).padStart(2, '0')).join(':');
    }

    function faultRecordStatusLabel(status) {
      const keys = {
        pending: 'faultHistoryPending',
        active: 'faultHistoryActive',
        closed: 'faultHistoryClosed',
        failed: 'faultHistoryFailed',
      };
      return t(keys[status] || keys.pending);
    }

    function renderFaultHistory() {
      if (!els.faultHistoryList || !els.faultHistoryCount) return;
      els.faultHistoryCount.textContent = t('faultHistoryCount', { count: state.faultRecords.length });
      if (!state.faultRecords.length) {
        const empty = document.createElement('div');
        empty.className = 'fault-history-empty';
        empty.textContent = t('faultHistoryEmpty');
        els.faultHistoryList.replaceChildren(empty);
        return;
      }

      const locale = state.language === 'en' ? 'en-US' : 'zh-CN';
      const rows = state.faultRecords.map((record) => {
        const scenario = localizedScenario(scenarioForFault(record.scenarioId));
        const row = document.createElement('article');
        row.className = 'fault-record';
        row.dataset.status = record.status;

        const dot = document.createElement('span');
        dot.className = 'fault-record-dot';
        dot.setAttribute('aria-hidden', 'true');

        const copy = document.createElement('div');
        copy.className = 'fault-record-copy';
        const titleRow = document.createElement('div');
        titleRow.className = 'fault-record-title-row';
        const title = document.createElement('strong');
        title.className = 'fault-record-title';
        title.textContent = t('faultHistoryInject', { title: scenario?.localizedTitle || record.scenarioId });
        title.title = title.textContent;
        const status = document.createElement('span');
        status.className = 'fault-record-status';
        status.textContent = faultRecordStatusLabel(record.status);
        titleRow.append(title, status);

        const meta = document.createElement('div');
        meta.className = 'fault-record-meta';
        const layerAndService = document.createElement('span');
        layerAndService.textContent = `${layerGroupLabel(record.layer)} / ${record.service || '-'}`;
        const started = document.createElement('span');
        started.textContent = new Date(record.startedAt).toLocaleTimeString(locale, { hour12: false });
        const duration = document.createElement('span');
        duration.textContent = t('faultHistoryDuration', { duration: formatFaultRecordDuration(record) });
        const triggers = document.createElement('span');
        triggers.textContent = t('faultHistoryTriggers', { count: record.triggerCount || 0 });
        meta.append(layerAndService, started, duration, triggers);
        if (record.error) {
          const error = document.createElement('span');
          error.textContent = record.error;
          error.title = record.error;
          meta.append(error);
        }

        copy.append(titleRow, meta);
        row.append(dot, copy);
        return row;
      });
      els.faultHistoryList.replaceChildren(...rows);
    }

    function finishActiveFaultRecord(status = 'closed') {
      if (!state.activeFaultRecordId) return;
      const record = state.faultRecords.find((item) => item.id === state.activeFaultRecordId);
      if (record) {
        record.status = status;
        record.endedAt = Date.now();
      }
      state.activeFaultRecordId = '';
      renderFaultHistory();
    }

    function startFaultRecord(scenario) {
      finishActiveFaultRecord('closed');
      const record = {
        id: `fault-record-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
        scenarioId: scenario.id,
        layer: scenario.layer || '-',
        service: scenario.service || scenario.target || '-',
        startedAt: Date.now(),
        endedAt: 0,
        status: 'pending',
        triggerCount: 0,
        error: '',
      };
      state.faultRecords.unshift(record);
      state.faultRecords = state.faultRecords.slice(0, 12);
      state.activeFaultRecordId = record.id;
      renderFaultHistory();
      return record.id;
    }

    function updateFaultRecord(recordId, updates) {
      const record = state.faultRecords.find((item) => item.id === recordId);
      if (!record) return;
      Object.assign(record, updates);
      if (record.status === 'failed' || record.status === 'closed') {
        record.endedAt = record.endedAt || Date.now();
        if (state.activeFaultRecordId === recordId) state.activeFaultRecordId = '';
      }
      renderFaultHistory();
    }

    function incrementActiveFaultRecordTrigger(triggerId = '', amount = 1) {
      if (!state.activeFaultRecordId) return;
      if (triggerId && state.countedFaultTriggerIds.includes(triggerId)) return;
      if (triggerId) {
        state.countedFaultTriggerIds.push(triggerId);
        state.countedFaultTriggerIds = state.countedFaultTriggerIds.slice(-80);
      }
      const record = state.faultRecords.find((item) => item.id === state.activeFaultRecordId);
      if (!record) return;
      record.triggerCount = (record.triggerCount || 0) + Math.max(1, Number(amount) || 1);
      renderFaultHistory();
    }

    function normalizeTraceIds(traceIds) {
      const values = Array.isArray(traceIds) ? traceIds : [traceIds];
      return [...new Set(values
        .map((value) => String(value || '').trim())
        .filter(Boolean))];
    }

    function buildObservabilityTraceQuery(traceIds) {
      return normalizeTraceIds(traceIds)
        .map((traceId) => `trace_id:${traceId}`)
        .join(' OR ');
    }

    function encodeObservabilityTraceQuery(query) {
      return `b64-${btoa(query).replace(/=+$/, '')}`;
    }

    function buildObservabilityTraceUrl(traceIds) {
      if (!state.demoConfig.observabilityConsoleUrl || !state.demoConfig.workspaceId) return '';
      const url = new URL('/tracing/link', state.demoConfig.observabilityConsoleUrl);
      Object.entries({
        lak: 'Tracing', activeName: 'LinkToTrackLink', w: state.demoConfig.workspaceId,
        time: '15m', mode: 'traceid', cols: 'time,trace_id,service,resource,duration',
        viewType: 'view', refresh: '30',
      }).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });
      const ids = normalizeTraceIds(traceIds);
      if (ids.length === 1) {
        url.searchParams.set('trace_id', ids[0]);
      }
      const query = buildObservabilityTraceQuery(ids);
      if (query) {
        url.searchParams.set('query', encodeObservabilityTraceQuery(query));
      }
      return url.toString();
    }

    function updateObservabilityTraceLink(traceIds) {
      if (arguments.length > 0) {
        state.lastTraceIds = normalizeTraceIds(traceIds);
      }
      const ids = normalizeTraceIds(state.lastTraceIds);
      const hasTrace = ids.length > 0;
      const traceUrl = hasTrace ? buildObservabilityTraceUrl(ids) : '';
      if (els.observabilityTraceLink) {
        els.observabilityTraceLink.href = traceUrl || '#';
        els.observabilityTraceLink.dataset.copyTrace = traceUrl ? 'false' : 'true';
        els.observabilityTraceLink.classList.toggle('disabled', !hasTrace);
        els.observabilityTraceLink.setAttribute('aria-disabled', hasTrace ? 'false' : 'true');
      }
      if (els.traceLinkHint) {
        if (!hasTrace) {
          els.traceLinkHint.textContent = t('parentTraceLinkPending');
        } else if (ids.length === 1) {
          els.traceLinkHint.textContent = t('parentTraceLinkReady', { traceId: shortId(ids[0]) });
        } else {
          els.traceLinkHint.textContent = t('parentTraceLinkReadyBatch', { count: ids.length });
        }
      }
    }

    function extractTraceIdFromText(text) {
      const match = String(text || '').match(/\btrace_id=([0-9A-Fa-f]+)\b/);
      return match ? match[1] : '';
    }

    function pickTraceIdFromLogBody(body) {
      if (!body || typeof body !== 'object') return '';
      if (body.traceId) return body.traceId;
      if (Array.isArray(body.traceIds) && body.traceIds[0]) return body.traceIds[0];
      const items = Array.isArray(body.items) ? body.items : [];
      for (const item of items) {
        const traceId = item.traceId || item.trace_id || extractTraceIdFromText(item.message);
        if (traceId) return traceId;
      }
      const lines = Array.isArray(body.lines) ? body.lines : [];
      for (const line of lines) {
        const traceId = extractTraceIdFromText(line);
        if (traceId) return traceId;
      }
      return '';
    }

    async function resolveTraceLinkFromOrder(body = {}, payload = {}, lookupSeq = ++state.traceLookupSeq) {
      const requestId = body.businessRequestId || payload.bizRequestId || payload.businessRequestId || '';
      const orderId = body.orderId || '';
      if (!requestId && !orderId) return;

      const params = new URLSearchParams();
      if (requestId) params.set('biz_request_id', requestId);
      if (orderId) params.set('order_id', orderId);
      params.set('limit', '12');

      for (let attempt = 0; attempt < 6; attempt += 1) {
        await new Promise((resolve) => setTimeout(resolve, attempt === 0 ? 350 : 500));
        if (lookupSeq !== state.traceLookupSeq) return;
        try {
          const { response, body: logBody } = await requestJson(`/api/demo/logs?${params.toString()}`);
          if (!response.ok) continue;
          const traceId = pickTraceIdFromLogBody(logBody);
          if (traceId) {
            if (lookupSeq === state.traceLookupSeq) updateObservabilityTraceLink(traceId);
            return;
          }
        } catch (_) {}
      }
    }

    function updateBusyControls() {
      [els.faultBtn, els.recoverBtn, els.refreshBtn].forEach((button) => {
        if (button) button.disabled = state.busy;
      });
      [els.faultLayerTabs, els.faultScenarioTabs].forEach((container) => {
        if (!container) return;
        container.querySelectorAll('.tab-button').forEach((button) => {
          button.disabled = state.busy || button.dataset.selectable !== 'true';
        });
      });
    }

    function setBusy(value) {
      state.busy = value;
      updateBusyControls();
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(`${apiPrefix}${url}`, {
        cache: 'no-store',
        ...options,
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
      });
      const text = await response.text();
      let body = text;
      try { body = JSON.parse(text); } catch (_) {}
      return { response, body };
    }

    function controlToken() {
      let token = sessionStorage.getItem(CONTROL_TOKEN_STORAGE_KEY) || '';
      if (!token) {
        token = window.prompt(state.language === 'en'
          ? 'Enter the demo control token for fault and warm-up operations:'
          : '请输入 Demo 控制口令，用于故障注入、恢复和预热：') || '';
        if (token) sessionStorage.setItem(CONTROL_TOKEN_STORAGE_KEY, token);
      }
      return token;
    }

    function controlRequestOptions() {
      const token = controlToken();
      if (!token) throw new Error(state.language === 'en' ? 'Control token is required' : '必须提供控制口令');
      return { method: 'POST', headers: { 'X-Demo-Control-Token': token } };
    }

    async function loadDemoConfig() {
      try {
        const { response, body } = await requestJson('/api/demo/config');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        state.demoConfig = body && typeof body === 'object' ? body : {};
        updateObservabilityTraceLink();
      } catch (error) {
        state.demoConfig = {};
        log(`Demo config: ${error.message}`, { status: 'warn' });
      }
    }

    function sendShopMessage(type, payload = {}) {
      if (!els.shopFrame.contentWindow) return;
      els.shopFrame.contentWindow.postMessage({
        source: 'mall-demo-parent',
        type,
        payload,
      }, window.location.origin);
    }

    function syncLanguageToShop() {
      sendShopMessage('set-language', { language: state.language });
    }

    function setLanguage(language) {
      state.language = I18N.setLanguage(language, { updateUrl: true });
      document.title = t('workbenchTitle');
      document.querySelectorAll('[data-lang]').forEach((button) => {
        button.classList.toggle('active', button.dataset.lang === state.language);
      });
      renderBusinessScenes();
      renderPreviewMode();
      renderLayoutState();
      updateFrameUrls();
      renderFaultCatalog();
      renderActiveFault(state.faultMode);
      renderFaultHistory();
      updateObservabilityTraceLink();
      syncLanguageToShop();
      syncPreviewContext();
    }

    function localizedScenario(scenario) {
      if (!scenario) return null;
      return {
        ...scenario,
        localizedTitle: I18N.faultText(scenario, 'title', state.language),
        localizedDescription: I18N.faultText(scenario, 'description', state.language),
        localizedObservation: I18N.faultText(scenario, 'observation', state.language),
        localizedLayer: layerGroupLabel(scenario.layer),
      };
    }

    function layerGroupForLayer(layer) {
      return FAULT_LAYER_GROUPS.find((group) => group.id === layer || group.layers.includes(layer)) || null;
    }

    function layerGroupLabel(layerOrGroup) {
      const group = layerGroupForLayer(layerOrGroup);
      return group ? t(group.labelKey) : I18N.layerLabel(layerOrGroup, state.language);
    }

    function orderedFaultLayers() {
      return FAULT_LAYER_GROUPS
        .filter((group) => state.faults.some((scenario) => group.layers.includes(scenario.layer)))
        .map((group) => group.id);
    }

    function scenariosForLayer(layer) {
      const group = layerGroupForLayer(layer);
      if (!group) return state.faults.filter((scenario) => scenario.layer === layer);
      return state.faults.filter((scenario) => group.layers.includes(scenario.layer));
    }

    function selectedFaultScenario() {
      return state.faults.find((scenario) => scenario.id === state.selectedFaultId) || null;
    }

    function scenarioForFault(fault) {
      return state.faults.find((scenario) => scenario.id === fault || scenario.mode === fault) || null;
    }

    function normalizeFaultMode(fault) {
      if (!fault || fault === 'none' || fault === '-') return 'none';
      const scenario = scenarioForFault(fault);
      return scenario?.id || fault;
    }

    function createTabButton(value, label, selected) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'tab-button';
      button.dataset.value = value;
      button.dataset.selectable = 'true';
      button.setAttribute('role', 'tab');
      button.setAttribute('aria-selected', selected ? 'true' : 'false');
      button.textContent = label;
      return button;
    }

    function createDisabledTab(label) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'tab-button';
      button.dataset.selectable = 'false';
      button.setAttribute('role', 'tab');
      button.setAttribute('aria-selected', 'false');
      button.textContent = label;
      button.disabled = true;
      return button;
    }

    function renderTabs(container, items, selectedValue) {
      if (!container) return;
      container.replaceChildren(...items.map((item) => createTabButton(item.value, item.label, item.value === selectedValue)));
      updateBusyControls();
    }

    function renderFaultCatalog() {
      if (!state.faults.length) {
        if (els.faultLayerTabs) els.faultLayerTabs.replaceChildren(createDisabledTab(t('commonLoading')));
        if (els.faultScenarioTabs) els.faultScenarioTabs.replaceChildren(createDisabledTab(t('commonLoading')));
        updateBusyControls();
        renderFaultDetail(null);
        return;
      }

      const layers = orderedFaultLayers();
      if (!state.selectedFaultLayer || !layers.includes(state.selectedFaultLayer)) {
        state.selectedFaultLayer = layers[0] || '';
      }

      renderTabs(els.faultLayerTabs, layers.map((layer) => ({
        value: layer,
        label: layerGroupLabel(layer),
      })), state.selectedFaultLayer);

      const scenarios = scenariosForLayer(state.selectedFaultLayer);
      if (!scenarios.some((scenario) => scenario.id === state.selectedFaultId)) {
        state.selectedFaultId = scenarios[0]?.id || '';
      }

      renderTabs(els.faultScenarioTabs, scenarios.map((scenario) => {
        const item = localizedScenario(scenario);
        return {
          value: scenario.id,
          label: item.localizedTitle,
        };
      }), state.selectedFaultId);
      renderFaultDetail(selectedFaultScenario());
    }

    function renderFaultDetail(scenario) {
      const item = localizedScenario(scenario);
      if (!item) {
        els.faultDetailTitle.textContent = t('parentFaultLoadingTitle');
        els.faultDetailKind.textContent = '-';
        els.faultDetailDesc.textContent = t('parentFaultLoadingDesc');
        els.faultDetailService.textContent = 'service=-';
        els.faultDetailTarget.textContent = 'target=-';
        els.faultDetailTtl.textContent = 'ttl=-';
        els.faultObservation.textContent = t('parentObservationLoading');
        return;
      }

      els.faultDetailTitle.textContent = item.localizedTitle;
      els.faultDetailKind.textContent = `${item.localizedLayer} · ${item.kind || '-'}`;
      els.faultDetailDesc.textContent = item.localizedDescription;
      els.faultDetailService.textContent = `service=${item.service || '-'}`;
      els.faultDetailTarget.textContent = `target=${item.target || '-'}`;
      els.faultDetailTtl.textContent = item.clientSide ? 'ttl=browser' : `ttl=${item.ttlSeconds || 0}s`;
      els.faultObservation.textContent = item.localizedObservation;
    }

    function renderActiveFault(fault) {
      const normalized = normalizeFaultMode(fault);
      const active = normalized !== 'none';
      const scenario = localizedScenario(scenarioForFault(normalized));
      els.activeFaultCard.classList.toggle('active', active);
      els.activeFaultDot.className = active ? 'dot bad' : 'dot';
      els.activeFaultCode.textContent = active ? normalized : 'none';
      els.activeFaultName.textContent = active ? (scenario?.localizedTitle || normalized) : t('parentNoFault');
      els.activeFaultDetail.textContent = active
        ? t('parentFaultActiveDetail', {
            layer: scenario?.localizedLayer || '-',
            kind: scenario?.kind || '-',
          })
        : t('parentNoFaultDetail');
    }

    function setFaultStatus(fault) {
      const normalized = normalizeFaultMode(fault);
      state.faultMode = normalized;
      renderActiveFault(normalized);
    }

    function summarizeFaults(body) {
      const backendFaults = [
        body.order?.fault?.mode,
        body.inventory?.fault?.mode,
        body.payment?.fault?.mode,
      ].map(normalizeFaultMode).filter((mode) => mode && mode !== 'none' && mode !== '-');
      if (state.activeClientFault) {
        backendFaults.unshift(state.activeClientFault.id);
      }
      return backendFaults.length ? backendFaults.join(', ') : 'none';
    }

    async function loadFaultCatalog() {
      try {
        const { response, body } = await requestJson('/api/demo/faults');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        state.faults = Array.isArray(body.items) ? body.items : [];
        renderFaultCatalog();
        renderActiveFault(state.faultMode);
      } catch (error) {
        log(t('parentCatalogFailed', { message: error.message }), { status: 'warn' });
        renderFaultCatalog();
      }
    }

    async function refreshStatus() {
      try {
        const { response, body } = await requestJson('/api/demo/status');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        setText(els.orderHealth, body.order?.health?.status || body.order?.status || '-');
        setText(els.inventoryHealth, body.inventory?.health?.status || body.inventory?.health?.error || '-');
        setText(els.paymentHealth, body.payment?.health?.status || body.payment?.health?.error || '-');
        els.lastRefresh.textContent = t('parentLastRefreshAt', { time: new Date().toLocaleTimeString() });
        setFaultStatus(summarizeFaults(body));
      } catch (error) {
        setText(els.orderHealth, t('commonUnknown'));
        setText(els.inventoryHealth, t('commonUnknown'));
        setText(els.paymentHealth, t('commonUnknown'));
        log(t('parentStatusFailed', { message: error.message }), { status: 'warn' });
      }
    }

    async function clearBackendFaultsForClientInjection(scenario) {
      const { response } = await requestJson('/api/demo/faults/off', controlRequestOptions());
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      sendShopMessage('clear-client-fault');
      return scenario;
    }

    function clientFaultHint(scenario) {
      if (scenario.id === 'frontend_sourcemap_error') return t('parentClientFaultHintSourceMap');
      if (scenario.id === 'frontend_slow_resource') return t('parentClientFaultHintSlow');
      return t('parentClientFaultHintClick');
    }

    function injectClientFault(scenario) {
      const item = localizedScenario(scenario);
      state.activeClientFault = scenario;
      setFaultStatus(scenario.id);
      sendShopMessage('set-client-fault', { scenario });
      log(t('parentClientFaultInjected', { title: item.localizedTitle }), { title: t('parentFaultPanel'), status: 'warn' });
      log(clientFaultHint(scenario), { title: t('parentLogPanel'), status: 'warn' });
    }

    async function enableFaultScenario(scenarioId) {
      const scenario = state.faults.find((item) => item.id === scenarioId) || { id: scenarioId, title: scenarioId };
      const item = localizedScenario(scenario);
      const recordId = startFaultRecord(scenario);
      setBusy(true);
      try {
        state.activeClientFault = null;
        sendShopMessage('clear-client-fault');
        setFaultStatus('none');

        if (scenario.clientSide) {
          await clearBackendFaultsForClientInjection(scenario);
          injectClientFault(scenario);
          updateFaultRecord(recordId, { status: 'active' });
          return;
        }

        const { response, body } = await requestJson(`/api/demo/faults/${encodeURIComponent(scenario.id)}/enable`, {
          ...controlRequestOptions(),
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        log(t('parentBackendFaultInjected', {
          title: item.localizedTitle,
          status: response.status,
          body: shortJson(body),
        }), { title: t('parentFaultPanel'), status: 'warn' });
        setFaultStatus(scenario.id);
        sendShopMessage('set-fault-hint', { scenario });
        updateFaultRecord(recordId, { status: 'active' });
      } catch (error) {
        updateFaultRecord(recordId, { status: 'failed', error: error.message });
        log(t('parentFaultInjectFailed', {
          title: item?.localizedTitle || scenario.id,
          message: error.message,
        }), { status: 'error' });
      } finally {
        setBusy(false);
        refreshStatus();
      }
    }

    async function clearAllFaults() {
      setBusy(true);
      try {
        const { response, body } = await requestJson('/api/demo/faults/off', controlRequestOptions());
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        state.activeClientFault = null;
        sendShopMessage('clear-client-fault');
        setFaultStatus('none');
        finishActiveFaultRecord('closed');
        log(`${t('parentFaultClosed')} HTTP ${response.status}: ${shortJson(body)}`, { title: t('parentFaultPanel') });
      } catch (error) {
        log(t('parentFaultCloseFailed', { message: error.message }), { status: 'error' });
      } finally {
        setBusy(false);
        refreshStatus();
      }
    }

    function updateFaultLayer(layer) {
      state.selectedFaultLayer = layer;
      const scenarios = scenariosForLayer(layer);
      state.selectedFaultId = scenarios[0]?.id || '';
      renderFaultCatalog();
    }

    function updateFaultScenario(scenarioId) {
      state.selectedFaultId = scenarioId;
      const scenario = selectedFaultScenario();
      if (scenario) state.selectedFaultLayer = layerGroupForLayer(scenario.layer)?.id || scenario.layer;
      renderFaultCatalog();
    }

    function handleShopMessage(event) {
      if (event.origin !== window.location.origin) {
        log(t('parentShopMessageBlocked'), { status: 'warn' });
        return;
      }
      const data = event.data || {};
      if (data.source !== 'mall-shop-demo') return;
      const payload = data.payload || {};

      if (data.type === 'shop-ready') {
        state.shopReady = true;
        log(t('parentShopReady'), { title: t('appTitle') });
        syncLanguageToShop();
        syncPreviewContext();
        if (state.activeClientFault) {
          sendShopMessage('set-client-fault', { scenario: state.activeClientFault });
        }
        return;
      }

      if (data.type === 'rum-status') {
        const status = payload.status || 'pending';
        const label = status === 'ready'
          ? t('parentRumReady')
          : status === 'missing'
            ? t('parentRumMissing')
            : status === 'failed'
              ? t('parentRumFailed')
              : t('parentRumPending');
        setText(els.rumStatus, label);
        if (els.rumDot) els.rumDot.className = status === 'ready' ? 'dot' : status === 'failed' ? 'dot bad' : 'dot warn';
        return;
      }

      if (data.type === 'shop-log') {
        log(payload.message || '-', { title: payload.title || t('shopLogTitle'), status: payload.status || 'info' });
        return;
      }

      if (data.type === 'order-result') {
        const body = payload.body || {};
        if (state.faultMode !== 'none') {
          incrementActiveFaultRecordTrigger(payload.triggerId || '', payload.batch ? body.total : 1);
        }
        const traceIds = normalizeTraceIds(payload.traceIds || body.traceIds || payload.traceId || body.traceId || body.trace_id);
        const lookupSeq = ++state.traceLookupSeq;
        updateObservabilityTraceLink(traceIds);
        if (!traceIds.length) resolveTraceLinkFromOrder(body, payload, lookupSeq);
        refreshStatus();
        return;
      }

      if (data.type === 'frontend-fault-triggered') {
        incrementActiveFaultRecordTrigger(payload.triggerId || '');
        updateObservabilityTraceLink([]);
        if (els.traceLinkHint) {
          els.traceLinkHint.textContent = payload.scenario?.id === 'frontend_slow_resource'
            ? t('parentTraceLinkSlowPending')
            : t('parentTraceLinkFrontendFault');
        }
        log(t('parentFrontendFaultTriggered', { action: payload.action || '-' }), { title: t('parentFaultPanel'), status: 'error' });
      }
    }

    window.addEventListener('message', handleShopMessage);
    document.querySelectorAll('[data-lang]').forEach((button) => {
      button.addEventListener('click', () => setLanguage(button.dataset.lang));
    });
    if (els.businessSceneList) {
      els.businessSceneList.addEventListener('click', (event) => {
        const button = event.target.closest('[data-scene-id]');
        if (button) selectBusinessScene(button.dataset.sceneId);
      });
    }
    if (els.previewToggle) {
      els.previewToggle.addEventListener('click', (event) => {
        const button = event.target.closest('[data-preview-mode]');
        if (button && !button.disabled) setPreviewMode(button.dataset.previewMode);
      });
    }
    if (els.leftCollapseBtn) els.leftCollapseBtn.addEventListener('click', () => toggleSidebar('left'));
    if (els.rightCollapseBtn) els.rightCollapseBtn.addEventListener('click', () => toggleSidebar('right'));
    if (els.mobileScenesBtn) els.mobileScenesBtn.addEventListener('click', () => toggleSidebar('left'));
    if (els.mobileFaultsBtn) els.mobileFaultsBtn.addEventListener('click', () => toggleSidebar('right'));
    if (els.bookstoreRailBtn) els.bookstoreRailBtn.addEventListener('click', () => selectBusinessScene('bookstore'));
    if (els.drawerBackdrop) els.drawerBackdrop.addEventListener('click', closeDrawers);
    compactViewport.addEventListener('change', closeDrawers);
    els.faultLayerTabs.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-value]');
      if (!button || button.disabled) return;
      updateFaultLayer(button.dataset.value);
    });
    els.faultScenarioTabs.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-value]');
      if (!button || button.disabled) return;
      updateFaultScenario(button.dataset.value);
    });
    if (els.observabilityTraceLink) {
      els.observabilityTraceLink.addEventListener('click', async (event) => {
        if (els.observabilityTraceLink.classList.contains('disabled')) {
          event.preventDefault();
          return;
        }
        if (els.observabilityTraceLink.dataset.copyTrace === 'true') {
          event.preventDefault();
          await navigator.clipboard.writeText(normalizeTraceIds(state.lastTraceIds).join('\n'));
        }
      });
    }
    els.faultBtn.addEventListener('click', () => enableFaultScenario(state.selectedFaultId || 'inventory_redis_timeout'));
    els.recoverBtn.addEventListener('click', clearAllFaults);
    if (els.refreshBtn) els.refreshBtn.addEventListener('click', refreshStatus);

    updateWorkbenchUrl();
    setLanguage(state.language);
    loadFaultCatalog();
    loadDemoConfig();
    refreshStatus();
    setInterval(refreshStatus, STATUS_REFRESH_INTERVAL_MS);
    setInterval(() => {
      if (state.activeFaultRecordId) renderFaultHistory();
    }, 1000);
  </script>
</body>
</html>
