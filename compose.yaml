name: guance-observability-demo

x-java-environment: &java-environment
  DD_ENV: ${DD_ENV:-demo}
  DD_VERSION: ${DD_VERSION:-local}
  DD_TAGS: project:${PROJECT_TAG:-mall-demo}
  PROJECT_TAG: ${PROJECT_TAG:-mall-demo}
  DD_AGENT_HOST: ${DATAKIT_HOST:-host.docker.internal}
  DD_TRACE_AGENT_PORT: "9529"
  DD_JMXFETCH_ENABLED: "true"
  DD_JMXFETCH_STATSD_HOST: ${DATAKIT_HOST:-host.docker.internal}
  DD_JMXFETCH_STATSD_PORT: "8125"
  DD_PROFILING_ENABLED: "true"
  DD_LOGS_INJECTION: "true"
  DD_TRACE_HEADER_TAGS: x-key-request:key_request,x-business-request-id:biz_request_id

x-java-service: &java-service
  restart: unless-stopped
  labels:
    project: ${PROJECT_TAG:-mall-demo}
  extra_hosts:
    - host.docker.internal:host-gateway

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    labels:
      project: ${PROJECT_TAG:-mall-demo}
    environment:
      MYSQL_DATABASE: selfheal
      MYSQL_USER: selfheal
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?copy .env.example to .env and set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?copy .env.example to .env and set MYSQL_ROOT_PASSWORD}
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    labels:
      project: ${PROJECT_TAG:-mall-demo}
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 20

  inventory-service:
    <<: *java-service
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    environment:
      <<: *java-environment
      DD_SERVICE: inventory-service
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LOGGING_FILE_NAME: /var/log/guance-observability-demo/inventory-service.log
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - demo-logs:/var/log/guance-observability-demo

  payment-service:
    <<: *java-service
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    environment:
      <<: *java-environment
      DD_SERVICE: payment-service
      LOGGING_FILE_NAME: /var/log/guance-observability-demo/payment-service.log
    volumes:
      - demo-logs:/var/log/guance-observability-demo

  order-service:
    <<: *java-service
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      <<: *java-environment
      DD_SERVICE: order-service
      MYSQL_URL: jdbc:mysql://mysql:3306/selfheal?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&connectTimeout=3000&socketTimeout=5000
      MYSQL_USER: selfheal
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?copy .env.example to .env and set MYSQL_PASSWORD}
      INVENTORY_URL: http://inventory-service:8081
      PAYMENT_URL: http://payment-service:8082
      ORDER_URL: http://order-service:8080
      DEMO_CONTROL_TOKEN: ${DEMO_CONTROL_TOKEN:?copy .env.example to .env and set DEMO_CONTROL_TOKEN}
      KUBERNETES_LOG_READER_ENABLED: "false"
      DEMO_LOG_DIRECTORY: /var/log/guance-observability-demo
      RUM_ENABLED: ${RUM_ENABLED:-false}
      RUM_APPLICATION_ID: ${RUM_APPLICATION_ID:-}
      RUM_SERVICE: mall-h5
      DATAKIT_RUM_URL: http://${DATAKIT_HOST:-host.docker.internal}:9529
      GUANCE_CONSOLE_URL: ${GUANCE_CONSOLE_URL:-https://console.guance.com}
      GUANCE_WORKSPACE_ID: ${GUANCE_WORKSPACE_ID:-}
      LOGGING_FILE_NAME: /var/log/guance-observability-demo/order-service.log
    depends_on:
      mysql:
        condition: service_healthy
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
    volumes:
      - demo-logs:/var/log/guance-observability-demo

  gateway-service:
    <<: *java-service
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    environment:
      <<: *java-environment
      DD_SERVICE: gateway-service
      ORDER_URL: http://order-service:8080
      LOGGING_FILE_NAME: /var/log/guance-observability-demo/gateway-service.log
    depends_on:
      order-service:
        condition: service_started
    ports:
      - ${DEMO_PORT:-8080}:8080
    volumes:
      - demo-logs:/var/log/guance-observability-demo

volumes:
  demo-logs: {}
