{{- $services := list
  (dict "name" "gateway-service" "port" 80 "targetPort" 8080)
  (dict "name" "order-service" "port" 8080 "targetPort" 8080)
  (dict "name" "inventory-service" "port" 8081 "targetPort" 8081)
  (dict "name" "payment-service" "port" 8082 "targetPort" 8082)
-}}
{{- range $index, $service := $services }}
{{- if $index }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observability-demo.fullname" $ }}-{{ $service.name }}
  labels:
    {{- include "observability-demo.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $service.name }}
  {{- if eq $service.name "gateway-service" }}
  {{- with $.Values.gateway.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
spec:
  {{- if eq $service.name "gateway-service" }}
  type: {{ $.Values.gateway.service.type }}
  {{- else }}
  type: ClusterIP
  {{- end }}
  selector:
    {{- include "observability-demo.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $service.name }}
  ports:
    - name: http
      port: {{ $service.port }}
      targetPort: {{ $service.targetPort }}
      protocol: TCP
{{- end }}
