apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "guance-observability-demo.fullname" . }}-app
  labels:
    {{- include "guance-observability-demo.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "guance-observability-demo.fullname" . }}-log-reader
  labels:
    {{- include "guance-observability-demo.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.logViewer.enabled }}
{{- if .Values.logViewer.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "guance-observability-demo.fullname" . }}-log-reader
  labels:
    {{- include "guance-observability-demo.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "guance-observability-demo.fullname" . }}-log-reader
  labels:
    {{- include "guance-observability-demo.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "guance-observability-demo.fullname" . }}-log-reader
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "guance-observability-demo.fullname" . }}-log-reader
{{- end }}
