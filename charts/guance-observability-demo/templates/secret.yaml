{{- if not .Values.existingSecret }}
{{- $secretName := include "guance-observability-demo.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $mysqlPassword := randAlphaNum 32 | b64enc -}}
{{- $mysqlRootPassword := randAlphaNum 32 | b64enc -}}
{{- $controlToken := randAlphaNum 32 | b64enc -}}
{{- if and $existing $existing.data -}}
{{- $mysqlPassword = get $existing.data .Values.secretKeys.mysqlPassword | default $mysqlPassword -}}
{{- $mysqlRootPassword = get $existing.data .Values.secretKeys.mysqlRootPassword | default $mysqlRootPassword -}}
{{- $controlToken = get $existing.data .Values.secretKeys.controlToken | default $controlToken -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "guance-observability-demo.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.secretKeys.mysqlPassword }}: {{ $mysqlPassword | quote }}
  {{ .Values.secretKeys.mysqlRootPassword }}: {{ $mysqlRootPassword | quote }}
  {{ .Values.secretKeys.controlToken }}: {{ $controlToken | quote }}
{{- end }}
